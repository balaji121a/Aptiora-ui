<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Result — APTIORA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#f5c842;--purple:#7c3aed;--dark:#050508;--dark3:#13131f;--text:#ffffff;--text2:rgba(255,255,255,0.55);--border:rgba(255,255,255,0.08);}
html,body{width:100%;height:100%;font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);overflow:hidden;}
body::before{content:"";position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.4;}
canvas{position:fixed;inset:0;z-index:1;pointer-events:none;}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:1;}
.orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(124,58,237,0.18),transparent 70%);top:-100px;left:-100px;animation:f1 12s ease-in-out infinite;}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(59,130,246,0.15),transparent 70%);bottom:-80px;right:-80px;animation:f2 10s ease-in-out infinite;}
@keyframes f1{0%,100%{transform:translate(0,0);}50%{transform:translate(40px,40px);}}
@keyframes f2{0%,100%{transform:translate(0,0);}50%{transform:translate(-30px,-30px);}}
.page{position:relative;z-index:10;height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{
  background:rgba(13,13,20,0.85);backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,0.1);border-radius:28px;
  padding:48px 44px;width:440px;max-width:100%;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 0 1px rgba(124,58,237,0.1);
  animation:cardUp 0.7s ease;position:relative;overflow:hidden;
}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(124,58,237,0.5),transparent);}
@keyframes cardUp{from{opacity:0;transform:translateY(32px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.trophy{font-size:64px;margin-bottom:16px;display:block;animation:bounce 0.8s ease 0.3s both;}
@keyframes bounce{0%{transform:scale(0);}70%{transform:scale(1.15);}100%{transform:scale(1);}}
.card-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;margin-bottom:24px;}
.score-circle{
  width:120px;height:120px;border-radius:50%;
  background:conic-gradient(var(--purple) var(--pct,0%), rgba(255,255,255,0.08) 0%);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 8px;position:relative;
  box-shadow:0 0 0 3px rgba(124,58,237,0.2);
}
.score-circle::before{content:"";position:absolute;width:96px;height:96px;border-radius:50%;background:var(--dark);}
.score-inner{position:relative;z-index:1;text-align:center;}
.score-num{font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:800;background:linear-gradient(135deg,var(--gold),#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.score-total{font-size:12px;color:var(--text2);}
.score-label{font-size:13px;color:var(--text2);margin-bottom:24px;}
.stats-row{display:flex;gap:12px;margin-bottom:28px;}
.stat-box{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;padding:14px 10px;text-align:center;}
.stat-val{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;margin-bottom:4px;}
.stat-lbl{font-size:11px;color:var(--text2);}
.btn-row{display:flex;gap:10px;}
.btn{
  flex:1;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:700;
  cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.3s;
}
.btn-primary{background:linear-gradient(135deg,var(--purple),#6d28d9);color:white;box-shadow:0 6px 20px rgba(124,58,237,0.35);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(124,58,237,0.45);}
.btn-secondary{background:rgba(255,255,255,0.07);border:1px solid var(--border);color:white;}
.btn-secondary:hover{background:rgba(255,255,255,0.1);}

/* LIGHT MODE */
body.light-mode{background:#f0f2f7!important;color:#1a1a2e!important;}
body.light-mode .card{background:rgba(255,255,255,0.92)!important;border-color:rgba(0,0,0,0.1)!important;}
body.light-mode .card-title{color:#1a1a2e!important;}
body.light-mode .stat-box{background:rgba(0,0,0,0.04)!important;border-color:rgba(0,0,0,0.08)!important;}
body.light-mode .score-label,.light-mode .stat-lbl,.light-mode .score-total{color:rgba(26,26,46,0.55)!important;}
body.light-mode .score-circle::before{background:#f0f2f7!important;}
body.light-mode .btn-secondary{background:rgba(0,0,0,0.05)!important;border-color:rgba(0,0,0,0.1)!important;color:#1a1a2e!important;}
body.light-mode canvas{opacity:0.15!important;}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<canvas id="c"></canvas>
<div class="page">
  <div class="card">
    <span class="trophy" id="trophy">🏆</span>
    <div class="card-title" id="resultTitle">Programming Result</div>
    <div class="score-circle" id="scoreCircle">
      <div class="score-inner">
        <div class="score-num" id="scoreNum">0</div>
        <div class="score-total" id="scoreTotal">/ 20</div>
      </div>
    </div>
    <div class="score-label" id="scoreLabel">Score</div>
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-val" id="timeStat">--</div>
        <div class="stat-lbl">Time Left (s)</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="pctStat">0%</div>
        <div class="stat-lbl">Accuracy</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="userStat">--</div>
        <div class="stat-lbl">Student</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="location.href='leaderboard.html'">🏆 Leaderboard</button>
      <button class="btn btn-primary" onclick="location.href='certificate.html'">🎓 Certificate</button>
    </div>
  </div>
</div>
<script>
(function(){let m=localStorage.getItem('darkMode')||(window.matchMedia&&window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');if(m==='light')document.body.classList.add('light-mode');})();
function toggleDark(){let isLight=document.body.classList.toggle("light-mode");localStorage.setItem("darkMode",isLight?"light":"dark");let b=document.getElementById("themeBtn");if(b)b.innerText=isLight?"☀️":"🌙";}
(function(){let b=document.getElementById("themeBtn");if(b)b.innerText=localStorage.getItem("darkMode")==="light"?"☀️":"🌙";})();
let score=Number(localStorage.getItem("pscore"))||0;
let time=Number(localStorage.getItem("ptime"))||0;
let username=localStorage.getItem("username")||"Guest";
let total=20;
let pct=Math.round((score/total)*100);

document.getElementById("scoreNum").innerText=score;
document.getElementById("scoreTotal").innerText="/ "+total;
document.getElementById("timeStat").innerText=time;
document.getElementById("pctStat").innerText=pct+"%";
document.getElementById("userStat").innerText=username.charAt(0)||"?";
document.getElementById("scoreCircle").style.setProperty("--pct",pct+"%");

// Trophy based on score
let trophy=document.getElementById("trophy");
let title=document.getElementById("resultTitle");
if(pct>=80){trophy.innerText="🥇";title.innerText="Excellent Result!";}
else if(pct>=60){trophy.innerText="🥈";title.innerText="Good Result!";}
else if(pct>=40){trophy.innerText="🥉";title.innerText="Fair Result";}
else{trophy.innerText="📝";title.innerText="Keep Practicing";}

// Save score
function saveScore(){
  let data=JSON.parse(localStorage.getItem("pleaderboard"))||[];
  data.push({name:username,score,time});
  data.sort((a,b)=>{if(b.score===a.score)return b.time-a.time;return b.score-a.score;});
  data=data.slice(0,5);localStorage.setItem("pleaderboard",JSON.stringify(data));
  launchConfetti();
}
function launchConfetti(){
  for(let i=0;i<60;i++){
    let c=document.createElement("div");
    c.style.cssText=`position:fixed;left:${Math.random()*100}%;top:-10px;width:8px;height:8px;background:hsl(${Math.random()*360},100%,65%);z-index:999;border-radius:2px;pointer-events:none;`;
    document.body.appendChild(c);
    c.animate([{transform:"translateY(0) rotate(0)"},{transform:`translateY(${innerHeight+20}px) rotate(720deg)`}],{duration:3000+Math.random()*2000});
    setTimeout(()=>c.remove(),5500);
  }
}
window.onload=saveScore;

const cv=document.getElementById("c"),ctx=cv.getContext("2d");
let W=cv.width=innerWidth,H=cv.height=innerHeight;
class P{constructor(){this.reset();}reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.r=Math.random()*1.5+0.3;this.dx=(Math.random()-.5)*.35;this.dy=(Math.random()-.5)*.35;this.a=Math.random()*.5+0.1;}
draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${this.a})`;ctx.fill();}
update(){this.x+=this.dx;this.y+=this.dy;if(this.x<0||this.x>W||this.y<0||this.y>H)this.reset();this.draw();}}
const pts=Array.from({length:80},()=>new P());const maxD=130;
function draw(){ctx.clearRect(0,0,W,H);pts.forEach(p=>p.update());for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){let d=Math.hypot(pts[i].x-pts[j].x,pts[i].y-pts[j].y);if(d<maxD){ctx.beginPath();ctx.strokeStyle=`rgba(124,58,237,${(1-d/maxD)*0.15})`;ctx.lineWidth=0.8;ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke();}}requestAnimationFrame(draw);}
draw();addEventListener("resize",()=>{W=cv.width=innerWidth;H=cv.height=innerHeight;});
</script>
</body>
</html>
