<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Secure Access — APTIORA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#f5c842;--purple:#7c3aed;--dark:#050508;--dark3:#13131f;--text:#ffffff;--text2:rgba(255,255,255,0.55);--border:rgba(255,255,255,0.08);}
html,body{width:100%;height:100%;font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);overflow:hidden;}
body::before{content:"";position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.4;}
canvas{position:fixed;inset:0;z-index:1;pointer-events:none;}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:1;}
.orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(124,58,237,0.2),transparent 70%);top:-100px;left:-100px;animation:f1 12s ease-in-out infinite;}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(59,130,246,0.15),transparent 70%);bottom:-80px;right:-80px;animation:f2 10s ease-in-out infinite;}
.orb3{width:300px;height:300px;background:radial-gradient(circle,rgba(245,200,66,0.08),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation:f3 14s ease-in-out infinite;}
@keyframes f1{0%,100%{transform:translate(0,0);}50%{transform:translate(40px,40px);}}
@keyframes f2{0%,100%{transform:translate(0,0);}50%{transform:translate(-30px,-30px);}}
@keyframes f3{0%,100%{transform:translate(-50%,-50%);}50%{transform:translate(-48%,-52%);}}

.page{position:relative;z-index:10;height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}

.card{
  background:rgba(13,13,20,0.85);backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,0.1);border-radius:28px;
  padding:48px 44px;width:440px;max-width:100%;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 0 1px rgba(124,58,237,0.12);
  animation:cardUp 0.7s ease;position:relative;overflow:hidden;
}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(124,58,237,0.5),transparent);}
@keyframes cardUp{from{opacity:0;transform:translateY(32px);}to{opacity:1;transform:translateY(0);}}

.lock-icon{width:72px;height:72px;margin:0 auto 20px;background:linear-gradient(135deg,rgba(124,58,237,0.2),rgba(109,40,217,0.1));border:1px solid rgba(124,58,237,0.3);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;}
.card-title{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;margin-bottom:6px;}
.card-sub{font-size:13px;color:var(--text2);margin-bottom:28px;}

/* OTP */
.otp{display:flex;gap:10px;justify-content:center;margin:20px 0;}
.otp input{width:min(46px,12vw);height:min(56px,14vw);text-align:center;font-size:clamp(16px,5vw,22px);font-weight:700;border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;background:rgba(255,255,255,0.06);color:white;outline:none;font-family:'Space Grotesk',sans-serif;transition:all 0.2s;}
.otp input:focus{border-color:rgba(124,58,237,0.6);background:rgba(124,58,237,0.08);box-shadow:0 0 0 3px rgba(124,58,237,0.12);}

.btn{
  width:100%;padding:14px;border:none;border-radius:12px;margin-top:16px;
  background:linear-gradient(135deg,var(--purple),#6d28d9);
  color:white;font-size:15px;font-weight:700;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all 0.3s;
  box-shadow:0 8px 24px rgba(124,58,237,0.35);
}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(124,58,237,0.45);}

#error{color:#fca5a5;font-size:13px;margin-top:10px;display:none;padding:8px;background:rgba(248,113,113,0.1);border-radius:8px;}
.success{display:none;color:#86efac;font-size:15px;font-weight:600;margin-top:12px;padding:10px;background:rgba(134,239,172,0.1);border-radius:8px;}

/* LIGHT MODE */
body.light-mode{background:#f0f2f7!important;color:#1a1a2e!important;}
body.light-mode .card{background:rgba(255,255,255,0.92)!important;border-color:rgba(0,0,0,0.1)!important;}
body.light-mode .card-title{color:#1a1a2e!important;}
body.light-mode .card-sub{color:rgba(26,26,46,0.55)!important;}
body.light-mode .otp input{background:rgba(0,0,0,0.05)!important;border-color:rgba(0,0,0,0.12)!important;color:#1a1a2e!important;}
body.light-mode canvas{opacity:0.15!important;}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<canvas id="c"></canvas>
<div class="page">
  <div class="card">
    <div class="lock-icon">🔐</div>
    <div class="card-title" id="title">Secure Authentication</div>
    <div class="card-sub">Enter the 6-digit secure code to access the assessment</div>
    <div class="otp">
      <input maxlength="1"><input maxlength="1"><input maxlength="1">
      <input maxlength="1"><input maxlength="1"><input maxlength="1">
    </div>
    <button class="btn" onclick="checkCode()">🔓 Verify & Enter</button>
    <p id="error">❌ Wrong Code — Try Again</p>
    <div class="success" id="success">✅ Access Granted — Entering...</div>
  </div>
</div>
<script>
(function(){let m=localStorage.getItem('darkMode')||(window.matchMedia&&window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');if(m==='light')document.body.classList.add('light-mode');})();
function toggleDark(){let isLight=document.body.classList.toggle("light-mode");localStorage.setItem("darkMode",isLight?"light":"dark");let b=document.getElementById("themeBtn");if(b)b.innerText=isLight?"☀️":"🌙";}
(function(){let b=document.getElementById("themeBtn");if(b)b.innerText=localStorage.getItem("darkMode")==="light"?"☀️":"🌙";})();
let inputs=document.querySelectorAll(".otp input");
inputs.forEach((inp,index)=>{
  inp.addEventListener("input",()=>{if(inp.value&&index<5)inputs[index+1].focus();});
  inp.addEventListener("keydown",e=>{if(e.key==="Backspace"&&!inp.value&&index>0)inputs[index-1].focus();});
});
inputs[0].focus();

function checkCode(){
  let code="";inputs.forEach(i=>code+=i.value);
  let err=document.getElementById("error"),success=document.getElementById("success");
  let settings=JSON.parse(localStorage.getItem("adminSettings"))||{};
  let correctCode=settings.secureCode||"123456";
  if(code===correctCode){
    err.style.display="none";success.style.display="block";
    launchConfetti();localStorage.setItem("allowTest","yes");
    setTimeout(()=>window.location.href="test.html",1500);
  } else {
    err.style.display="block";
    inputs.forEach(i=>{i.value="";i.style.borderColor="rgba(248,113,113,0.5)";});
    setTimeout(()=>inputs.forEach(i=>i.style.borderColor=""),600);
    inputs[0].focus();
  }
}
function launchConfetti(){
  for(let i=0;i<60;i++){
    let c=document.createElement("div");
    c.style.cssText=`position:fixed;width:7px;height:7px;background:hsl(${Math.random()*360},100%,65%);top:-10px;left:${Math.random()*100}%;z-index:999;border-radius:2px;pointer-events:none;`;
    document.body.appendChild(c);
    c.animate([{transform:"translateY(0) rotate(0)"},{transform:`translateY(${innerHeight+20}px) rotate(720deg)`}],{duration:2500+Math.random()*1500});
    setTimeout(()=>c.remove(),4500);
  }
}
document.addEventListener("keydown",e=>{if(e.key==="Enter")checkCode();});

const cv=document.getElementById("c"),ctx=cv.getContext("2d");
let W=cv.width=innerWidth,H=cv.height=innerHeight;
class P{constructor(){this.reset();}reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.r=Math.random()*1.5+0.3;this.dx=(Math.random()-.5)*.35;this.dy=(Math.random()-.5)*.35;this.a=Math.random()*.5+0.1;}
draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${this.a})`;ctx.fill();}
update(){this.x+=this.dx;this.y+=this.dy;if(this.x<0||this.x>W||this.y<0||this.y>H)this.reset();this.draw();}}
const pts=Array.from({length:80},()=>new P());const maxD=130;
function draw(){ctx.clearRect(0,0,W,H);pts.forEach(p=>p.update());for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){let d=Math.hypot(pts[i].x-pts[j].x,pts[i].y-pts[j].y);if(d<maxD){ctx.beginPath();ctx.strokeStyle=`rgba(124,58,237,${(1-d/maxD)*0.15})`;ctx.lineWidth=0.8;ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke();}}requestAnimationFrame(draw);}
draw();addEventListener("resize",()=>{W=cv.width=innerWidth;H=cv.height=innerHeight;});
document.addEventListener("mousemove",e=>{let x=(e.clientX/W-.5)*20,y=(e.clientY/H-.5)*20;document.querySelector(".orb1").style.transform=`translate(${x}px,${y}px)`;document.querySelector(".orb2").style.transform=`translate(${-x}px,${-y}px)`;});
</script>
</body>
</html>
