<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Leaderboard — APTIORA</title>
<link rel="stylesheet" href="aptiora.css">
<style>
.lb-row{display:grid;grid-template-columns:60px 1fr 100px 100px;padding:15px 22px;align-items:center;border-bottom:1px solid var(--border);transition:background 0.2s;}
.lb-row:last-child{border-bottom:none;}
.lb-row:hover{background:rgba(255,255,255,0.02);}
.lb-row.r1{background:linear-gradient(90deg,rgba(245,200,66,0.08),transparent);border-left:3px solid rgba(245,200,66,0.5);}
.lb-row.r2{background:linear-gradient(90deg,rgba(203,213,225,0.06),transparent);border-left:3px solid rgba(148,163,184,0.4);}
.lb-row.r3{background:linear-gradient(90deg,rgba(205,127,50,0.08),transparent);border-left:3px solid rgba(205,127,50,0.4);}
.lb-thead{display:grid;grid-template-columns:60px 1fr 100px 100px;padding:13px 22px;background:rgba(124,58,237,0.1);border-bottom:1px solid var(--border);}
.th{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;}
.av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--purple),#6d28d9);color:white;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;margin-right:9px;vertical-align:middle;}
.ai-analysis-box{background:rgba(124,58,237,0.08);border:1px solid rgba(124,58,237,0.2);border-radius:var(--radius-lg);padding:18px 20px;margin-top:4px;display:none;}
.ai-analysis-lbl{font-size:11px;font-weight:700;color:#a78bfa;margin-bottom:8px;}
.ai-analysis-txt{font-size:13px;color:rgba(255,255,255,0.82);line-height:1.7;}
@media(max-width:580px){.lb-thead,.lb-row{grid-template-columns:50px 1fr 80px;}.th:last-child,.lb-row>div:last-child{display:none;}}
body.light .lb-row{color:var(--tx);border-bottom-color:var(--bdr);}
body.light .glass-card{color:var(--tx);}
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div>
<canvas class="bg-canvas" id="bgCanvas"></canvas>
<div id="sb"></div>
<div class="app-main" id="appMain">
  <div class="app-topbar">
    <div class="topbar-left"><button class="collapse-btn" id="collapseBtn">☰</button><div class="page-title">🏆 Leaderboard</div></div>
    <div class="topbar-right"><button class="tb-btn" id="themeBtn">🌙</button></div>
  </div>
  <div class="app-page">
    <div class="glass-card anim-fadeUp" style="margin-bottom:16px;">
      <div class="lb-thead"><div class="th">Rank</div><div class="th">Name</div><div class="th" style="text-align:center">Score</div><div class="th" style="text-align:center">Attempted</div></div>
      <div id="lbBody"></div>
      <div id="emptyMsg" style="display:none;text-align:center;padding:40px;color:var(--text2);font-size:14px;">🎯 No results yet. Be the first!</div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:16px;">
      <button class="btn btn-primary" onclick="getCert()">📜 My Certificate</button>
      <button class="btn btn-secondary" onclick="exportCSV()">📊 Export CSV</button>
      <button class="btn btn-secondary" id="aiAnalBtn" style="display:none" onclick="showAnalysis()">🧠 AI Analysis</button>
    </div>
    <div class="ai-analysis-box" id="aiBox">
      <div class="ai-analysis-lbl">🤖 AI Performance Analysis</div>
      <div class="ai-analysis-txt" id="aiTxt">Loading...</div>
    </div>
  </div>
</div>
<script src="aptiora.js"></script>
<script>
let user=getCurrentUser();if(!user)throw'';
let {reg,name}=user;
document.getElementById('sb').innerHTML=buildSidebar('leaderboard',name,reg);
initSidebar();
let board=JSON.parse(localStorage.getItem('leaderboard'))||[];
board.sort((a,b)=>b.score-a.score);
let medals=['🥇','🥈','🥉'],rCls=['r1','r2','r3'];
if(!board.length){document.getElementById('emptyMsg').style.display='block';}
else{
  let html='';board.forEach((u,i)=>{html+=`<div class="lb-row${i<3?' '+rCls[i]:''}"><div style="font-size:20px">${medals[i]||'#'+(i+1)}</div><div style="display:flex;align-items:center"><span class="av">${u.name.charAt(0)}</span>${u.name}</div><div style="text-align:center;font-weight:700;color:${i===0?'#f5c842':i===1?'#94a3b8':i===2?'#cd7f32':'white'}">${u.score}/20</div><div style="text-align:center;font-size:13px;color:var(--text2)">${u.attempted||u.score}/20</div></div>`;});
  document.getElementById('lbBody').innerHTML=html;
  launchConfetti(50);
}
let myEntry=board.find(u=>u.name===name);
if(myEntry)document.getElementById('aiAnalBtn').style.display='block';
function getCert(){
  if(!myEntry){alert('⚠️ Take the assessment first!');return;}
  let rank=board.findIndex(u=>u.name===name)+1;
  localStorage.setItem('rank',rank);localStorage.setItem('cert_score',myEntry.score);localStorage.setItem('cert_attempted',myEntry.attempted||myEntry.score);
  nav('certificate.html');
}
function exportCSV(){
  if(!board.length){alert('No data.');return;}
  let csv='Rank,Name,Score,Attempted\n'+board.map((u,i)=>`${i+1},${u.name},${u.score}/20,${u.attempted||u.score}/20`).join('\n');
  let a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='APTIORA_Results.csv';a.click();
}
let analysisShown=false;
async function showAnalysis(){
  if(analysisShown)return;analysisShown=true;
  let box=document.getElementById('aiBox');box.style.display='block';box.scrollIntoView({behavior:'smooth'});
  let wrongs=JSON.parse(localStorage.getItem('wrongAnswers_'+reg))||[];
  let score=myEntry?myEntry.score:0,attempted=myEntry?myEntry.attempted||myEntry.score:0;
  try{
    let wrongList=wrongs.length?wrongs.map((w,i)=>`${i+1}. Q: "${w.q}" — Correct: "${w.correct}", Student chose: "${w.chosen}"`).join('\n'):'None';
    let resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:220,messages:[{role:'user',content:`Write a 3-4 sentence personalized aptitude assessment review for ${name}.\nScore: ${score}/20, Attempted: ${attempted}/20\nWrong answers:\n${wrongList}\n\nBe specific about weak areas and give actionable improvement advice. Warm and encouraging tone.`}]})});
    let data=await resp.json();document.getElementById('aiTxt').innerText=(data.content&&data.content[0]&&data.content[0].text)||'Keep practicing to improve!';
  }catch(e){document.getElementById('aiTxt').innerText='Great effort! Review your wrong answers and focus on weaker topics.';}
}
</script>
</body>
</html>
