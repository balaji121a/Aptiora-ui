<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Leaderboard — APTIORA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#f5c842;--purple:#7c3aed;--dark:#050508;--dark3:#13131f;--text:#ffffff;--text2:rgba(255,255,255,0.55);--border:rgba(255,255,255,0.08);}
html,body{width:100%;min-height:100%;font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);overflow-x:hidden;}
body::before{content:"";position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.4;}
canvas{position:fixed;inset:0;z-index:1;pointer-events:none;}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:1;}
.orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(124,58,237,0.15),transparent 70%);top:-100px;left:-100px;animation:f1 12s ease-in-out infinite;}
.orb2{width:300px;height:300px;background:radial-gradient(circle,rgba(245,200,66,0.08),transparent 70%);bottom:-60px;right:-60px;animation:f2 10s ease-in-out infinite;}
@keyframes f1{0%,100%{transform:translate(0,0);}50%{transform:translate(30px,30px);}}
@keyframes f2{0%,100%{transform:translate(0,0);}50%{transform:translate(-20px,-20px);}}

/* NAVBAR */
.navbar{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;background:rgba(5,5,8,0.7);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:800;letter-spacing:3px;background:linear-gradient(135deg,#fff 30%,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

.page{position:relative;z-index:10;padding:96px 24px 48px;max-width:760px;margin:0 auto;}

/* PODIUM SECTION */
.lb-header{text-align:center;margin-bottom:36px;animation:fadeIn 0.8s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.lb-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.3);border-radius:30px;padding:7px 18px;font-size:12px;font-weight:600;color:#a78bfa;letter-spacing:0.5px;margin-bottom:16px;}
.lb-title{font-family:'Space Grotesk',sans-serif;font-size:clamp(28px,6vw,44px);font-weight:800;margin-bottom:8px;background:linear-gradient(135deg,#fff,rgba(255,255,255,0.7));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

/* TABLE */
.lb-card{background:var(--dark3);border:1px solid var(--border);border-radius:20px;overflow:hidden;animation:fadeIn 0.6s ease 0.2s both;}
.lb-table-header{display:grid;grid-template-columns:60px 1fr 100px 100px;padding:14px 24px;background:rgba(124,58,237,0.1);border-bottom:1px solid var(--border);}
.th{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;}
.lb-row{display:grid;grid-template-columns:60px 1fr 100px 100px;padding:16px 24px;align-items:center;border-bottom:1px solid var(--border);transition:background 0.2s;opacity:0;transform:translateY(8px);}
.lb-row:last-child{border-bottom:none;}
.lb-row:hover{background:rgba(255,255,255,0.02);}
.lb-row.rank-1{background:linear-gradient(90deg,rgba(245,200,66,0.08),rgba(249,115,22,0.04));border-left:2px solid rgba(245,200,66,0.5);}
.lb-row.rank-2{background:linear-gradient(90deg,rgba(203,213,225,0.06),transparent);border-left:2px solid rgba(148,163,184,0.4);}
.lb-row.rank-3{background:linear-gradient(90deg,rgba(245,158,11,0.08),transparent);border-left:2px solid rgba(205,127,50,0.4);}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--purple),#6d28d9);color:white;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;margin-right:10px;vertical-align:middle;box-shadow:0 4px 10px rgba(124,58,237,0.3);}
.name-cell{display:flex;align-items:center;font-size:14px;font-weight:500;}
.score-cell{font-weight:700;font-size:14px;}
.attempted-cell{font-size:13px;color:var(--text2);}
.rank-cell{font-size:20px;}
.empty-lb{text-align:center;padding:50px;color:var(--text2);font-size:14px;}

/* BUTTONS */
.btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:24px;animation:fadeIn 0.6s ease 0.4s both;}
.btn{
  padding:13px 28px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all 0.3s;
}
.btn-primary{background:linear-gradient(135deg,var(--purple),#6d28d9);color:white;box-shadow:0 6px 20px rgba(124,58,237,0.35);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(124,58,237,0.45);}
.btn-secondary{background:rgba(255,255,255,0.07);border:1px solid var(--border);color:white;}
.btn-secondary:hover{background:rgba(255,255,255,0.1);}

@media(max-width:600px){.lb-table-header,.lb-row{grid-template-columns:50px 1fr 80px;}.th:last-child,.attempted-cell{display:none;}}

/* LIGHT MODE */
body.light-mode{background:#f0f2f7!important;color:#1a1a2e!important;}
body.light-mode .navbar{background:rgba(240,242,247,0.85)!important;border-bottom-color:rgba(0,0,0,0.08)!important;}
body.light-mode .nav-logo{background:linear-gradient(135deg,#1a1a2e 30%,#7c3aed)!important;-webkit-background-clip:text!important;-webkit-text-fill-color:transparent!important;}
body.light-mode .lb-card{background:#ffffff!important;border-color:rgba(0,0,0,0.08)!important;}
body.light-mode .lb-table-header{background:rgba(124,58,237,0.08)!important;border-bottom-color:rgba(0,0,0,0.08)!important;}
body.light-mode .th{color:rgba(26,26,46,0.55)!important;}
body.light-mode .lb-row{border-bottom-color:rgba(0,0,0,0.06)!important;color:#1a1a2e!important;}
body.light-mode .lb-title{background:linear-gradient(135deg,#1a1a2e,rgba(26,26,46,0.7))!important;-webkit-background-clip:text!important;-webkit-text-fill-color:transparent!important;}
body.light-mode .attempted-cell{color:rgba(26,26,46,0.55)!important;}
body.light-mode .btn-secondary{background:rgba(0,0,0,0.05)!important;border-color:rgba(0,0,0,0.1)!important;color:#1a1a2e!important;}
body.light-mode .empty-lb{color:rgba(26,26,46,0.55)!important;}
body.light-mode canvas{opacity:0.2!important;}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<canvas id="c"></canvas>

<nav class="navbar">
  <div class="nav-logo">APTIORA</div>
</nav>

<div class="page">
  <div class="lb-header">
    <div class="lb-badge"><span>🏆</span> Assessment Results</div>
    <div class="lb-title">Leaderboard</div>
  </div>

  <div class="lb-card">
    <div class="lb-table-header">
      <div class="th">Rank</div>
      <div class="th">Name</div>
      <div class="th" style="text-align:center;">Score</div>
      <div class="th" style="text-align:center;">Attempted</div>
    </div>
    <div id="lbBody"></div>
    <div id="emptyMsg" class="empty-lb" style="display:none;">🎯 No assessment results yet.<br><small style="opacity:0.6;">Be the first to complete the test!</small></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-secondary" onclick="location.href='dashboard.html'">⬅ Dashboard</button>
    <button class="btn btn-secondary" onclick="showAIAnalysis()" id="aiAnalysisBtn" style="display:none;">🧠 AI Analysis</button>
    <button class="btn btn-primary" onclick="getCertificate()">📜 My Certificate</button>
    <button class="btn btn-secondary" onclick="exportCSV()">📊 Export CSV</button>
  </div>
</div>

<script>
(function(){let m=localStorage.getItem('darkMode')||(window.matchMedia&&window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');if(m==='light')document.body.classList.add('light-mode');})();
function toggleDark(){let isLight=document.body.classList.toggle("light-mode");localStorage.setItem("darkMode",isLight?"light":"dark");let b=document.getElementById("themeBtn");if(b)b.innerText=isLight?"☀️":"🌙";}
(function(){let b=document.getElementById("themeBtn");if(b)b.innerText=localStorage.getItem("darkMode")==="light"?"☀️":"🌙";})();
let board=JSON.parse(localStorage.getItem("leaderboard"))||[];
board.sort((a,b)=>b.score-a.score);
let reg=localStorage.getItem("username");
function getUsers(){return JSON.parse(localStorage.getItem("users"))||{"714524205005":{name:"Balaji"},"714524205053":{name:"Vicky"},"714524205027":{name:"Ismail"},"714524205041":{name:"Sakthivel"}};}
let users=getUsers();
let currentUser=(users[reg]||{}).name||"User";
let medals=["🥇","🥈","🥉"];
let rankClasses=["rank-1","rank-2","rank-3"];

if(board.length===0){document.getElementById("emptyMsg").style.display="block";}
else{
  board.forEach((u,i)=>{
    let row=document.createElement("div");
    row.className="lb-row"+(i<3?" "+rankClasses[i]:"");
    row.innerHTML=`
      <div class="rank-cell">${medals[i]||"#"+(i+1)}</div>
      <div class="name-cell"><span class="avatar">${u.name.charAt(0)}</span>${u.name}</div>
      <div class="score-cell" style="text-align:center;color:${i===0?'#f5c842':i===1?'#94a3b8':i===2?'#cd7f32':'white'}">${u.score}/20</div>
      <div class="attempted-cell" style="text-align:center;">${u.attempted||u.score}/20</div>`;
    setTimeout(()=>{row.style.transition="0.5s";row.style.opacity=1;row.style.transform="translateY(0)";},i*120);
    document.getElementById("lbBody").appendChild(row);
  });
  launchConfetti();
}

function getCertificate(){
  let userEntry=board.find(u=>u.name===currentUser);
  if(!userEntry){alert("⚠️ You have not taken the Assessment yet!");return;}
  let rank=board.findIndex(u=>u.name===currentUser)+1;
  localStorage.setItem("rank",rank);localStorage.setItem("cert_score",userEntry.score);localStorage.setItem("cert_attempted",userEntry.attempted||userEntry.score);
  location.href="certificate.html";
}

function launchConfetti(){
  for(let i=0;i<60;i++){
    let c=document.createElement("div");
    c.style.cssText=`position:fixed;left:${Math.random()*100}%;top:-10px;width:8px;height:8px;background:hsl(${Math.random()*360},100%,65%);z-index:999;border-radius:2px;pointer-events:none;`;
    document.body.appendChild(c);
    c.animate([{transform:"translateY(0) rotate(0)"},{transform:`translateY(${innerHeight+20}px) rotate(720deg)`}],{duration:3000+Math.random()*2000});
    setTimeout(()=>c.remove(),5500);
  }
}

function exportCSV(){
  let b=[...board].sort((a,x)=>x.score-a.score);
  if(!b.length){alert("No data to export.");return;}
  let csv="Rank,Name,Score,Attempted\n"+b.map((u,i)=>`${i+1},${u.name},${u.score}/20,${u.attempted||u.score}/20`).join("\n");
  let a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="APTIORA_Results.csv";a.click();
}

// Show AI Analysis button only for current user who has taken assessment
let myEntry=board.find(u=>u.name===currentUser);
if(myEntry){document.getElementById("aiAnalysisBtn").style.display="block";}

let aiAnalysisOpen=false;
function showAIAnalysis(){
  if(aiAnalysisOpen)return;aiAnalysisOpen=true;
  let wrongs=JSON.parse(localStorage.getItem("wrongAnswers_"+reg))||[];
  let myScore=myEntry?myEntry.score:0;
  let myAttempted=myEntry?myEntry.attempted||myEntry.score:0;
  let overlay=document.createElement("div");
  overlay.style.cssText="position:fixed;inset:0;background:rgba(5,5,8,0.97);backdrop-filter:blur(16px);z-index:900;display:flex;align-items:center;justify-content:center;padding:24px;";
  overlay.innerHTML=`<div style="background:rgba(13,13,20,0.95);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:36px;max-width:520px;width:100%;max-height:85vh;overflow-y:auto;position:relative;">
    <div style="font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;margin-bottom:6px;text-align:center;">🧠 AI Performance Analysis</div>
    <div style="font-size:13px;color:rgba(255,255,255,0.5);text-align:center;margin-bottom:24px;">Personalized feedback based on your assessment</div>
    <div style="display:flex;gap:10px;justify-content:center;margin-bottom:24px;flex-wrap:wrap;">
      <div style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:12px 20px;text-align:center;"><div style="font-size:22px;font-weight:700;color:#f5c842;">${myScore}/20</div><div style="font-size:11px;color:rgba(255,255,255,0.4);">Score</div></div>
      <div style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:12px 20px;text-align:center;"><div style="font-size:22px;font-weight:700;color:#a78bfa;">${myAttempted}/20</div><div style="font-size:11px;color:rgba(255,255,255,0.4);">Attempted</div></div>
      <div style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:12px 20px;text-align:center;"><div style="font-size:22px;font-weight:700;color:${myScore>=14?'#86efac':'#fca5a5'}">${Math.round(myScore/20*100)}%</div><div style="font-size:11px;color:rgba(255,255,255,0.4);">Accuracy</div></div>
    </div>
    <div id="aiAnalysisContent" style="background:rgba(124,58,237,0.08);border:1px solid rgba(124,58,237,0.2);border-radius:14px;padding:18px;font-size:14px;line-height:1.7;color:rgba(255,255,255,0.85);">
      <div style="text-align:center;color:rgba(255,255,255,0.4);font-size:13px;">🤖 Generating your personalized analysis...</div>
    </div>
    <button onclick="this.closest('div[style]').remove();aiAnalysisOpen=false;" style="width:100%;padding:12px;border:none;border-radius:12px;background:rgba(255,255,255,0.08);color:white;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-top:16px;">✕ Close</button>
  </div>`;
  document.body.appendChild(overlay);
  fetchAIAnalysis(myScore,myAttempted,wrongs);
}

async function fetchAIAnalysis(score,attempted,wrongs){
  try{
    let wrongList=wrongs.length?wrongs.map((w,i)=>`${i+1}. Q: "${w.q}" — Correct: "${w.correct}", Student chose: "${w.chosen}"`).join("\n"):"None (all answered correctly)";
    let prompt=`A B.Tech student named ${currentUser} completed an aptitude assessment.\n\nScore: ${score}/20\nAttempted: ${attempted}/20\nWrong answers:\n${wrongList}\n\nGive a SHORT personalized performance analysis (4-5 sentences):\n1. Overall performance comment\n2. Identify weak areas from wrong answers\n3. Specific improvement advice\n4. Encouragement\n\nBe direct, warm, and specific. No bullet points, just flowing text.`;
    let resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:250,messages:[{role:"user",content:prompt}]})});
    let data=await resp.json();
    let analysis=(data.content&&data.content[0]&&data.content[0].text)||"Great effort on completing the assessment! Review your wrong answers carefully and focus on the topics where you made mistakes. Practice regularly to improve your score.";
    let el=document.getElementById("aiAnalysisContent");
    if(el)el.innerHTML=`<div style="font-size:11px;font-weight:700;color:#a78bfa;margin-bottom:8px;">🤖 AI Feedback for ${currentUser}</div><div>${analysis.replace(/\n/g,"<br>")}</div>`;
  }catch(e){
    let el=document.getElementById("aiAnalysisContent");
    if(el)el.innerText="Review your wrong answers and focus on weaker topics. Keep practicing consistently!";
  }
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d");
let W=cv.width=innerWidth,H=cv.height=innerHeight;
class P{constructor(){this.reset();}reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.r=Math.random()*1.5+0.3;this.dx=(Math.random()-.5)*.35;this.dy=(Math.random()-.5)*.35;this.a=Math.random()*.5+0.1;}
draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${this.a})`;ctx.fill();}
update(){this.x+=this.dx;this.y+=this.dy;if(this.x<0||this.x>W||this.y<0||this.y>H)this.reset();this.draw();}}
const pts=Array.from({length:80},()=>new P());const maxD=130;
function draw(){ctx.clearRect(0,0,W,H);pts.forEach(p=>p.update());for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){let d=Math.hypot(pts[i].x-pts[j].x,pts[i].y-pts[j].y);if(d<maxD){ctx.beginPath();ctx.strokeStyle=`rgba(124,58,237,${(1-d/maxD)*0.12})`;ctx.lineWidth=0.8;ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke();}}requestAnimationFrame(draw);}
draw();addEventListener("resize",()=>{W=cv.width=innerWidth;H=cv.height=innerHeight;});
</script>
</body>
</html>
