<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Practice — APTIORA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#f5c842;--purple:#7c3aed;--dark:#050508;--dark3:#13131f;--text:#ffffff;--text2:rgba(255,255,255,0.55);--border:rgba(255,255,255,0.08);}
html,body{width:100%;min-height:100%;font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);overflow-x:hidden;}
body::before{content:"";position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.4;}
canvas{position:fixed;inset:0;z-index:1;pointer-events:none;}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:1;}
.orb1{width:400px;height:400px;background:radial-gradient(circle,rgba(124,58,237,0.15),transparent 70%);top:-80px;left:-80px;animation:f1 12s ease-in-out infinite;}
.orb2{width:300px;height:300px;background:radial-gradient(circle,rgba(245,200,66,0.06),transparent 70%);bottom:-60px;right:-60px;animation:f2 10s ease-in-out infinite;}
@keyframes f1{0%,100%{transform:translate(0,0);}50%{transform:translate(30px,30px);}}
@keyframes f2{0%,100%{transform:translate(0,0);}50%{transform:translate(-20px,-20px);}}

/* NAVBAR */
.navbar{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;background:rgba(5,5,8,0.7);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:800;letter-spacing:2px;background:linear-gradient(135deg,#fff 30%,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.back-btn{background:rgba(255,255,255,0.07);border:1px solid var(--border);color:white;padding:8px 16px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;transition:all 0.2s;}
.back-btn:hover{background:rgba(255,255,255,0.12);}

/* LAYOUT */
.layout{display:flex;min-height:100vh;position:relative;z-index:10;padding-top:64px;}

/* SIDEBAR */
.sidebar{
  width:220px;flex-shrink:0;
  background:rgba(13,13,20,0.8);backdrop-filter:blur(12px);
  border-right:1px solid var(--border);
  padding:24px 16px;position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto;
}
.sidebar-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;padding-left:4px;}
.menu-item{
  padding:12px 14px;border-radius:12px;cursor:pointer;
  font-size:14px;font-weight:500;color:var(--text2);
  transition:all 0.2s;margin-bottom:6px;display:flex;align-items:center;gap:10px;
  border:1px solid transparent;
}
.menu-item:hover{background:rgba(124,58,237,0.1);color:white;border-color:rgba(124,58,237,0.2);}
.menu-item.active{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.3);color:white;font-weight:600;}

/* CONTENT */
.content{flex:1;padding:28px 28px 48px;}

/* HEADER CARD */
.header-card{
  background:linear-gradient(135deg,rgba(124,58,237,0.2),rgba(109,40,217,0.1));
  border:1px solid rgba(124,58,237,0.2);border-radius:20px;padding:24px 28px;
  margin-bottom:20px;animation:fadeIn 0.6s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.header-card h3{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;margin-bottom:4px;}
.header-card p{font-size:13px;color:var(--text2);}

/* TABLE CARD */
.table-card{background:var(--dark3);border:1px solid var(--border);border-radius:20px;overflow:hidden;animation:fadeIn 0.6s ease 0.1s both;}
.table-head{display:grid;grid-template-columns:1.5fr 80px 80px 100px 120px;padding:13px 24px;background:rgba(124,58,237,0.1);border-bottom:1px solid var(--border);}
.th{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;}
.table-row{display:grid;grid-template-columns:1.5fr 80px 80px 100px 120px;padding:16px 24px;border-bottom:1px solid var(--border);align-items:center;transition:background 0.2s;}
.table-row:last-child{border-bottom:none;}
.table-row:hover{background:rgba(255,255,255,0.02);}
.td{font-size:14px;}
.start-btn{
  padding:8px 18px;border:none;border-radius:10px;
  background:linear-gradient(135deg,var(--purple),#6d28d9);
  color:white;cursor:pointer;font-weight:700;font-size:13px;
  font-family:'Inter',sans-serif;transition:all 0.3s;
  box-shadow:0 4px 12px rgba(124,58,237,0.3);
}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(124,58,237,0.4);}

@media(max-width:700px){
  .sidebar{display:none;}
  .table-head,.table-row{grid-template-columns:1fr 60px 60px 100px;}
  .th:nth-child(3),.td:nth-child(3){display:none;}
}

/* LIGHT MODE */
body.light-mode{background:#f0f2f7!important;color:#1a1a2e!important;}
body.light-mode .navbar{background:rgba(240,242,247,0.85)!important;border-bottom-color:rgba(0,0,0,0.08)!important;}
body.light-mode .nav-logo{background:linear-gradient(135deg,#1a1a2e 30%,#7c3aed)!important;-webkit-background-clip:text!important;-webkit-text-fill-color:transparent!important;}
body.light-mode .back-btn{background:rgba(0,0,0,0.05)!important;border-color:rgba(0,0,0,0.1)!important;color:#1a1a2e!important;}
body.light-mode .sidebar{background:rgba(255,255,255,0.8)!important;border-right-color:rgba(0,0,0,0.08)!important;}
body.light-mode .sidebar-title{color:rgba(26,26,46,0.5)!important;}
body.light-mode .menu-item{color:rgba(26,26,46,0.6)!important;}
body.light-mode .menu-item.active{background:rgba(124,58,237,0.1)!important;color:#1a1a2e!important;}
body.light-mode .header-card{background:linear-gradient(135deg,rgba(124,58,237,0.1),rgba(109,40,217,0.06))!important;border-color:rgba(124,58,237,0.15)!important;}
body.light-mode .header-card h3,.light-mode .header-card p{color:#1a1a2e!important;}
body.light-mode .table-card{background:#ffffff!important;border-color:rgba(0,0,0,0.08)!important;}
body.light-mode .table-head{background:rgba(124,58,237,0.08)!important;border-bottom-color:rgba(0,0,0,0.08)!important;}
body.light-mode .th{color:rgba(26,26,46,0.55)!important;}
body.light-mode .table-row{border-bottom-color:rgba(0,0,0,0.06)!important;color:#1a1a2e!important;}
body.light-mode canvas{opacity:0.2!important;}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<canvas id="c"></canvas>

<nav class="navbar">
  <div class="nav-logo">📝 Practice</div>
  <button class="back-btn" onclick="location.href='aptitude.html'">⬅ Back</button>
</nav>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-title">Topics</div>
    <div class="menu-item active" onclick="setTopic('Verbal Ability',this)">📖 Verbal Ability</div>
    <div class="menu-item" onclick="setTopic('Algebra',this)">🔢 Algebra</div>
    <div class="menu-item" onclick="setTopic('Series & Sequence',this)">📈 Series & Sequence</div>
  </div>

  <div class="content">
    <div class="header-card">
      <h3 id="topicTitle">Verbal Ability</h3>
      <p>📅 25 Mar 2026 – 05 Apr 2026 &nbsp;·&nbsp; Aptitude Course</p>
    </div>

    <div class="table-card">
      <div class="table-head">
        <div class="th">Practice</div>
        <div class="th">Total</div>
        <div class="th">Solved</div>
        <div class="th">Remaining</div>
        <div class="th">Action</div>
      </div>
      <div class="table-row">
        <div class="td">📝 Practice Set</div>
        <div class="td">10</div>
        <div class="td" id="solvedCount">0</div>
        <div class="td" id="remainCount">10</div>
        <div class="td"><button class="start-btn" onclick="openTest()">▶ Start</button></div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){let m=localStorage.getItem('darkMode')||(window.matchMedia&&window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');if(m==='light')document.body.classList.add('light-mode');})();
function toggleDark(){let isLight=document.body.classList.toggle("light-mode");localStorage.setItem("darkMode",isLight?"light":"dark");let b=document.getElementById("themeBtn");if(b)b.innerText=isLight?"☀️":"🌙";}
(function(){let b=document.getElementById("themeBtn");if(b)b.innerText=localStorage.getItem("darkMode")==="light"?"☀️":"🌙";})();
let currentTopic="Verbal Ability";
let reg=localStorage.getItem("username");

function setTopic(topic, el){
  currentTopic=topic;
  document.getElementById("topicTitle").innerText=topic;
  document.querySelectorAll(".menu-item").forEach(m=>m.classList.remove("active"));
  el.classList.add("active");
  updateCounts();
}
function updateCounts(){
  let topicNums={"Verbal Ability":1,"Algebra":2,"Series & Sequence":3};
  let n=topicNums[currentTopic];
  let pct=parseInt(localStorage.getItem("p"+n+"_done_"+reg))||0;
  let solved=Math.floor(pct/10);
  document.getElementById("solvedCount").innerText=solved;
  document.getElementById("remainCount").innerText=10-solved;
}
updateCounts();
function openTest(){
  localStorage.setItem("topic",currentTopic);
  localStorage.setItem("mode","practice");
  let nums={"Verbal Ability":1,"Algebra":2,"Series & Sequence":3};
  localStorage.setItem("currentTopic",nums[currentTopic]);
  location.href="test.html";
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d");
let W=cv.width=innerWidth,H=cv.height=innerHeight;
class P{constructor(){this.reset();}reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.r=Math.random()*1.5+0.3;this.dx=(Math.random()-.5)*.35;this.dy=(Math.random()-.5)*.35;this.a=Math.random()*.5+0.1;}
draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${this.a})`;ctx.fill();}
update(){this.x+=this.dx;this.y+=this.dy;if(this.x<0||this.x>W||this.y<0||this.y>H)this.reset();this.draw();}}
const pts=Array.from({length:60},()=>new P());const maxD=120;
function draw(){ctx.clearRect(0,0,W,H);pts.forEach(p=>p.update());for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){let d=Math.hypot(pts[i].x-pts[j].x,pts[i].y-pts[j].y);if(d<maxD){ctx.beginPath();ctx.strokeStyle=`rgba(124,58,237,${(1-d/maxD)*0.12})`;ctx.lineWidth=0.8;ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke();}}requestAnimationFrame(draw);}
draw();addEventListener("resize",()=>{W=cv.width=innerWidth;H=cv.height=innerHeight;});
</script>
</body>
</html>
