<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Practice — APTIORA</title>
<link rel="stylesheet" href="aptiora.css">
<style>
.prac-card{background:rgba(13,13,20,0.88);border:1px solid rgba(124,58,237,0.18);border-radius:var(--radius-xl);padding:20px;margin-bottom:12px;cursor:pointer;transition:all 0.22s;}
.prac-card:hover{border-color:rgba(124,58,237,0.4);transform:translateY(-2px);}
.prac-card.on{border-color:rgba(124,58,237,0.55);background:rgba(124,58,237,0.08);}
body.light .prac-card{background:rgba(255,255,255,0.88)!important;}
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div>
<canvas class="bg-canvas" id="bgCanvas"></canvas>
<div id="sb"></div>
<div class="app-main" id="appMain">
  <div class="app-topbar">
    <div class="topbar-left"><button class="collapse-btn" id="collapseBtn">☰</button><div class="page-title">📝 Practice</div></div>
    <div class="topbar-right"><button class="tb-btn" id="themeBtn">🌙</button></div>
  </div>
  <div class="app-page">
    <div class="grid2" style="align-items:start;">
      <div>
        <div style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;margin-bottom:10px;">📚 Topics</div>
        <div id="topicList"></div>
      </div>
      <div class="glass-card anim-fadeUp">
        <div style="font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;margin-bottom:4px;" id="selTitle">Select a Topic</div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:18px;" id="selSub">Choose from the left panel</div>
        <div class="grid2" style="margin-bottom:18px;" id="selStats"></div>
        <button class="btn btn-primary btn-full" id="startPracBtn" onclick="startPrac()" disabled>▶ Start Practice</button>
      </div>
    </div>
  </div>
</div>
<script src="aptiora.js"></script>
<script>
let user=getCurrentUser();if(!user)throw'';
let {reg,name}=user;
document.getElementById('sb').innerHTML=buildSidebar('aptitude',name,reg);
initSidebar();
let topics=[{id:1,icon:'📖',name:'Verbal Ability',color:'var(--purple)'},{id:2,icon:'🔢',name:'Algebra',color:'var(--blue)'},{id:3,icon:'📈',name:'Series & Sequence',color:'var(--amber)'}];
let selTopic=null;
document.getElementById('topicList').innerHTML=topics.map(t=>{
  let p=parseInt(localStorage.getItem('p'+t.id+'_done_'+reg))||0;
  return`<div class="prac-card" onclick="selT(${t.id},this)"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;"><div style="font-size:22px">${t.icon}</div><div><div style="font-size:14px;font-weight:600">${t.name}</div><div style="font-size:12px;color:var(--text2)">Progress: ${p}%</div></div></div><div class="prog-bar"><div class="prog-fill" style="width:${p}%;background:${t.color}"></div></div></div>`;
}).join('');
function selT(id,el){
  selTopic=topics.find(t=>t.id===id);
  document.querySelectorAll('.prac-card').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  let p=parseInt(localStorage.getItem('p'+id+'_done_'+reg))||0;
  let solved=Math.floor(p/10);
  document.getElementById('selTitle').innerText=selTopic.icon+' '+selTopic.name;
  document.getElementById('selSub').innerText='Aptitude Course · Practice Set';
  document.getElementById('selStats').innerHTML=[{l:'Total',v:'10'},{l:'Solved',v:solved},{l:'Remaining',v:10-solved},{l:'Progress',v:p+'%'}].map(s=>`<div class="stat-card" style="padding:12px;text-align:center"><div class="stat-val" style="font-size:22px">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`).join('');
  document.getElementById('startPracBtn').disabled=false;
}
function startPrac(){
  if(!selTopic)return;
  localStorage.setItem('topic',selTopic.name);localStorage.setItem('mode','practice');localStorage.setItem('currentTopic',selTopic.id);
  nav('test.html');
}
</script>
</body>
</html>
