<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login — APTIORA</title>
<link rel="stylesheet" href="aptiora.css">
<style>
html,body{min-height:100%;display:flex;align-items:center;justify-content:center;}
.login-page{position:relative;z-index:10;width:100%;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{background:rgba(13,13,20,0.88);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.14);border-radius:28px;padding:44px 40px;width:420px;max-width:100%;position:relative;overflow:hidden;animation:scaleIn 0.5s ease;}
.login-card::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(124,58,237,0.5),transparent);}
.login-logo{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:800;letter-spacing:3px;background:linear-gradient(135deg,#fff 30%,#f5c842);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:4px;}
.login-tagline{text-align:center;font-size:13px;color:rgba(255,255,255,0.55);margin-bottom:28px;}
.tab-row{display:flex;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:3px;margin-bottom:22px;}
.tab-btn{flex:1;padding:9px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;color:rgba(255,255,255,0.55);background:none;}
.tab-btn.on{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;box-shadow:0 4px 12px rgba(124,58,237,0.3);}
.form-group{margin-bottom:15px;}
.form-label{display:block;font-size:11px;font-weight:700;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px;}
.form-input{width:100%;padding:11px 15px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.08);border-radius:14px;color:#fff;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:all 0.2s;}
.form-input:focus{border-color:rgba(124,58,237,0.55);background:rgba(124,58,237,0.06);}
.form-input::placeholder{color:rgba(255,255,255,0.25);}
.input-wrap{position:relative;display:flex;align-items:center;}
.input-wrap .form-input{padding-right:44px;}
.eye-btn{position:absolute;right:12px;background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.4);font-size:18px;padding:0;display:flex;align-items:center;}
.eye-btn:hover{color:#a78bfa;}
.login-btn{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.3s;box-shadow:0 6px 20px rgba(124,58,237,0.35);margin-top:4px;}
.login-btn:hover{transform:translateY(-2px);}
.login-btn:active{transform:translateY(0);}
.err-msg{font-size:13px;text-align:center;padding:10px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:12px;margin-top:12px;display:none;color:#fca5a5;}
.success-msg{font-size:14px;text-align:center;padding:10px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);border-radius:12px;margin-top:12px;display:none;color:#6ee7b7;font-weight:600;}
body.light .login-card{background:rgba(255,255,255,0.95);}
body.light .login-logo{background:linear-gradient(135deg,#1a1a2e 30%,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
body.light .tab-row{background:rgba(0,0,0,0.04);border-color:rgba(0,0,0,0.1);}
body.light .tab-btn{color:rgba(26,26,46,0.6);}
body.light .login-tagline{color:rgba(26,26,46,0.55);}
body.light .form-label{color:rgba(26,26,46,0.55);}
body.light .form-input{background:rgba(0,0,0,0.04);border-color:rgba(0,0,0,0.1);color:#1a1a2e;}
body.light .form-input::placeholder{color:rgba(26,26,46,0.3);}
body.light .eye-btn{color:rgba(26,26,46,0.4);}
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
<canvas class="bg-canvas" id="bgCanvas"></canvas>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">📘 APTIORA</div>
    <div class="login-tagline">Aptitude Online Examination Portal</div>
    <div class="tab-row">
      <button class="tab-btn on" id="stuTab" onclick="setTab('student')">🎓 Student</button>
      <button class="tab-btn" id="admTab" onclick="setTab('admin')">⚙️ Admin</button>
    </div>

    <!-- Student -->
    <div id="stuForm">
      <div class="form-group">
        <label class="form-label">Register Number</label>
        <input class="form-input" id="regInput" placeholder="e.g. 714524205005" type="text" inputmode="numeric" maxlength="15" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <input class="form-input" id="passInput" placeholder="Enter your password" type="password" autocomplete="current-password">
          <button class="eye-btn" type="button" onclick="toggleEye('passInput','eyeStu')" id="eyeStu">👁</button>
        </div>
      </div>
      <button class="login-btn" id="loginBtn" onclick="stuLogin()">🚀 Login</button>
      <div class="success-msg" id="stuSuccess">✅ Login Successful! Entering...</div>
      <div class="err-msg" id="stuErr"></div>
    </div>

    <!-- Admin -->
    <div id="admForm" style="display:none">
      <div class="form-group">
        <label class="form-label">Admin Username</label>
        <input class="form-input" id="admUser" placeholder="Enter admin username" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Admin Password</label>
        <div class="input-wrap">
          <input class="form-input" id="admPass" placeholder="Enter admin password" type="password" autocomplete="current-password">
          <button class="eye-btn" type="button" onclick="toggleEye('admPass','eyeAdm')" id="eyeAdm">👁</button>
        </div>
      </div>
      <button class="login-btn" id="admBtn" onclick="admLogin()">🔐 Admin Login</button>
      <div class="success-msg" id="admSuccess">✅ Admin Login Successful!</div>
      <div class="err-msg" id="admErr"></div>
    </div>
  </div>
</div>

<script src="aptiora.js"></script>
<script>
/* ─────────────────────────────────────────────
   SELF-CONTAINED LOGIN LOGIC
   Does NOT depend on any aptiora.js function.
   Works with any version of aptiora.js.
───────────────────────────────────────────── */

// Default users (fallback if admin hasn't added custom users)
var DEFAULT_USERS = {
  '714524205005': { name:'Balaji',   dept:'IT', batch:'2024-2028', password:'1234' },
  '714524205053': { name:'Vicky',    dept:'IT', batch:'2024-2028', password:'1234' },
  '714524205027': { name:'Ismail',   dept:'IT', batch:'2024-2028', password:'1234' },
  '714524205041': { name:'Sakthivel',dept:'IT', batch:'2024-2028', password:'1234' }
};

function getAllUsers() {
  try {
    var stored = localStorage.getItem('users');
    return stored ? JSON.parse(stored) : DEFAULT_USERS;
  } catch(e) { return DEFAULT_USERS; }
}

function setTab(t) {
  document.getElementById('stuTab').classList.toggle('on', t === 'student');
  document.getElementById('admTab').classList.toggle('on', t === 'admin');
  document.getElementById('stuForm').style.display = t === 'student' ? 'block' : 'none';
  document.getElementById('admForm').style.display = t === 'admin'   ? 'block' : 'none';
}

function toggleEye(inputId, btnId) {
  var inp = document.getElementById(inputId);
  var btn = document.getElementById(btnId);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'text' ? '🙈' : '👁';
}

function showMsg(id, msg, show) {
  var el = document.getElementById(id);
  el.style.display = show ? 'block' : 'none';
  if (msg) el.textContent = msg;
}

function shakeInput(id) {
  var el = document.getElementById(id);
  el.style.borderColor = 'rgba(239,68,68,0.6)';
  el.animate(
    [{transform:'translateX(0)'},{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(-4px)'},{transform:'translateX(4px)'},{transform:'translateX(0)'}],
    {duration:300}
  );
  setTimeout(function(){ el.style.borderColor = ''; }, 800);
}

/* ── STUDENT LOGIN ── */
function stuLogin() {
  var reg  = document.getElementById('regInput').value.trim();
  var pass = document.getElementById('passInput').value;

  showMsg('stuErr',    '', false);
  showMsg('stuSuccess','', false);

  if (!reg)  { showMsg('stuErr', '❌ Enter your Register Number', true); shakeInput('regInput');  return; }
  if (!pass) { showMsg('stuErr', '❌ Enter your password',        true); shakeInput('passInput'); return; }

  var users = getAllUsers();
  var user  = users[reg];

  if (!user) {
    showMsg('stuErr', '❌ Register number not found', true);
    shakeInput('regInput');
    return;
  }

  if (user.password !== pass) {
    showMsg('stuErr', '❌ Wrong password. Try again.', true);
    shakeInput('passInput');
    try { sndWrong(); } catch(e) {}
    return;
  }

  // ✅ Credentials valid — save session
  var btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Entering...';

  // Save session: both localStorage (data) + sessionStorage (tab gate)
  localStorage.setItem('username', reg);
  sessionStorage.setItem('aptSession', '1');

  // Award first badge if function available
  try { awardBadge(reg, 'first_practice'); } catch(e) {}

  showMsg('stuSuccess', '✅ Login Successful! Entering...', true);

  setTimeout(function() {
    window.location.href = 'dashboard.html';
  }, 600);
}

/* ── ADMIN LOGIN ── */
function admLogin() {
  var uVal = document.getElementById('admUser').value.trim();
  var pVal = document.getElementById('admPass').value;

  showMsg('admErr',    '', false);
  showMsg('admSuccess','', false);

  if (!uVal || !pVal) { showMsg('admErr', '❌ Enter username and password', true); return; }

  var creds = { user: 'admin', pass: 'admin123' };
  try {
    var stored = localStorage.getItem('adminCreds');
    if (stored) creds = JSON.parse(stored);
  } catch(e) {}

  if (uVal === creds.user && pVal === creds.pass) {
    var btn = document.getElementById('admBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Entering...';

    sessionStorage.setItem('adminSession', '1');
    showMsg('admSuccess', '✅ Admin Login Successful!', true);

    setTimeout(function() {
      window.location.href = 'admin.html';
    }, 600);
  } else {
    showMsg('admErr', '❌ Wrong admin credentials', true);
    try { sndWrong(); } catch(e) {}
  }
}

/* Enter key support */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    if (document.getElementById('stuForm').style.display !== 'none') stuLogin();
    else admLogin();
  }
});
</script>
</body>
</html>
