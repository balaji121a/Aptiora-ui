<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login — APTIORA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#f5c842;--purple:#7c3aed;--blue:#3b82f6;
  --dark:#050508;--dark2:#0d0d14;--dark3:#13131f;
  --text:#ffffff;--text2:rgba(255,255,255,0.55);
  --border:rgba(255,255,255,0.08);
}
html,body{width:100%;min-height:100%;font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);overflow-x:hidden;}

body::before{content:"";position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.4;}
canvas{position:fixed;inset:0;z-index:1;pointer-events:none;}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:1;}
.orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(124,58,237,0.18),transparent 70%);top:-100px;left:-100px;animation:orbFloat1 12s ease-in-out infinite;}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(59,130,246,0.15),transparent 70%);bottom:-80px;right:-80px;animation:orbFloat2 10s ease-in-out infinite;}
.orb3{width:300px;height:300px;background:radial-gradient(circle,rgba(245,200,66,0.08),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation:orbFloat3 14s ease-in-out infinite;}
@keyframes orbFloat1{0%,100%{transform:translate(0,0);}50%{transform:translate(40px,40px);}}
@keyframes orbFloat2{0%,100%{transform:translate(0,0);}50%{transform:translate(-30px,-30px);}}
@keyframes orbFloat3{0%,100%{transform:translate(-50%,-50%);}50%{transform:translate(-48%,-52%);}}

.page{position:relative;z-index:10;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}

/* LOGO TOP */
.logo-top{position:fixed;top:0;left:0;right:0;z-index:100;padding:18px 48px;display:flex;align-items:center;background:rgba(5,5,8,0.6);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);animation:navSlide 0.8s ease;}
@keyframes navSlide{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
.nav-logo{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:800;letter-spacing:3px;background:linear-gradient(135deg,#fff 30%,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

/* CARD */
.card{
  background:rgba(13,13,20,0.8);
  backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:28px;
  padding:44px 40px;
  width:420px;
  max-width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 0 1px rgba(124,58,237,0.1);
  animation:cardUp 0.7s ease;
  position:relative;overflow:hidden;
}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(124,58,237,0.5),transparent);}
@keyframes cardUp{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}

.card-logo{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:800;letter-spacing:3px;text-align:center;margin-bottom:4px;background:linear-gradient(135deg,#fff 30%,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.card-sub{text-align:center;font-size:12px;color:var(--text2);margin-bottom:28px;letter-spacing:0.5px;}

/* TABS */
.tabs{display:flex;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:14px;padding:4px;margin-bottom:28px;gap:4px;}
.tab{flex:1;padding:10px;text-align:center;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.3s;color:var(--text2);}
.tab.active{background:linear-gradient(135deg,var(--purple),#6d28d9);color:white;box-shadow:0 4px 12px rgba(124,58,237,0.3);}

/* FORM */
.form-section{display:none;}
.form-section.active{display:block;animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.inp-wrap{position:relative;margin-bottom:14px;}
.inp-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:0.3px;}
.inp{
  width:100%;padding:13px 16px;padding-right:44px;
  background:rgba(255,255,255,0.06);
  border:1.5px solid rgba(255,255,255,0.12);
  border-radius:12px;color:white;font-size:14px;
  font-family:'Inter',sans-serif;outline:none;transition:all 0.2s;
}
.inp::placeholder{color:rgba(255,255,255,0.3);}
.inp:focus{border-color:rgba(124,58,237,0.6);background:rgba(124,58,237,0.06);box-shadow:0 0 0 3px rgba(124,58,237,0.1);}
.inp.err{border-color:#f87171;animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
.eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:16px;color:var(--text2);}

/* FORGOT */
.forgot-link{text-align:right;font-size:12px;color:rgba(124,58,237,0.8);cursor:pointer;margin-bottom:16px;transition:color 0.2s;}
.forgot-link:hover{color:#a78bfa;}

/* BTN */
.btn{
  width:100%;padding:14px;border:none;border-radius:12px;
  background:linear-gradient(135deg,var(--purple),#6d28d9);
  color:white;font-size:15px;font-weight:700;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all 0.3s;
  box-shadow:0 8px 24px rgba(124,58,237,0.35);
  position:relative;overflow:hidden;
}
.btn::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);opacity:0;transition:0.3s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(124,58,237,0.45);}
.btn:hover::before{opacity:1;}

/* MESSAGES */
.err-msg{color:#fca5a5;font-size:12px;text-align:center;margin-top:10px;display:none;padding:8px;background:rgba(248,113,113,0.1);border-radius:8px;border:1px solid rgba(248,113,113,0.2);}
.success-msg{color:#86efac;font-size:12px;text-align:center;margin-top:10px;display:none;padding:8px;background:rgba(134,239,172,0.1);border-radius:8px;border:1px solid rgba(134,239,172,0.2);}

/* LOADER */
.loading-overlay{position:absolute;inset:0;background:rgba(5,5,8,0.7);backdrop-filter:blur(6px);border-radius:28px;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:white;z-index:5;}
.spinner{width:36px;height:36px;border:3px solid rgba(124,58,237,0.2);border-top-color:#7c3aed;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* OTP MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
.modal-bg.open{display:flex;}
.modal{
  background:rgba(13,13,20,0.95);
  border:1px solid rgba(124,58,237,0.2);
  border-radius:24px;padding:36px;width:360px;
  color:white;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  animation:cardUp 0.3s ease;
  position:relative;
}
.modal::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(124,58,237,0.5),transparent);}
.modal h3{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;margin-bottom:6px;}
.modal p{font-size:13px;color:var(--text2);margin-bottom:20px;}
.otp-boxes{display:flex;gap:10px;justify-content:center;margin-bottom:16px;}
.otp-box{width:46px;height:54px;border-radius:12px;text-align:center;font-size:22px;font-weight:700;border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);color:white;outline:none;font-family:'Space Grotesk',sans-serif;transition:all 0.2s;}
.otp-box:focus{border-color:rgba(124,58,237,0.6);background:rgba(124,58,237,0.08);box-shadow:0 0 0 3px rgba(124,58,237,0.15);}
.otp-timer{font-size:12px;color:var(--text2);margin-bottom:14px;}
.cancel-btn{background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;font-size:13px;font-family:'Inter',sans-serif;margin-top:10px;transition:color 0.2s;}
.cancel-btn:hover{color:rgba(255,255,255,0.6);}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.divider-line{flex:1;height:1px;background:var(--border);}
.divider-text{font-size:11px;color:var(--text2);}

/* LIGHT MODE */
body.light-mode{background:#f0f2f7!important;color:#1a1a2e!important;}
body.light-mode .logo-top{background:rgba(240,242,247,0.85)!important;border-bottom-color:rgba(0,0,0,0.08)!important;}
body.light-mode .nav-logo{background:linear-gradient(135deg,#1a1a2e 30%,#7c3aed)!important;-webkit-background-clip:text!important;-webkit-text-fill-color:transparent!important;}
body.light-mode .card{background:rgba(255,255,255,0.92)!important;border-color:rgba(0,0,0,0.1)!important;}
body.light-mode .card-logo{background:linear-gradient(135deg,#1a1a2e 30%,#7c3aed)!important;-webkit-background-clip:text!important;-webkit-text-fill-color:transparent!important;}
body.light-mode .card-sub{color:rgba(26,26,46,0.55)!important;}
body.light-mode .tabs{background:rgba(0,0,0,0.04)!important;border-color:rgba(0,0,0,0.08)!important;}
body.light-mode .tab{color:rgba(26,26,46,0.6)!important;}
body.light-mode .inp-label{color:rgba(26,26,46,0.6)!important;}
body.light-mode .inp{background:rgba(0,0,0,0.04)!important;border-color:rgba(0,0,0,0.12)!important;color:#1a1a2e!important;}
body.light-mode .inp::placeholder{color:rgba(26,26,46,0.35)!important;}
body.light-mode canvas{opacity:0.15!important;}
body.light-mode #themeBtn{background:rgba(0,0,0,0.05)!important;border-color:rgba(0,0,0,0.1)!important;color:#1a1a2e!important;}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<canvas id="c"></canvas>

<div class="logo-top">
  <div class="nav-logo">APTIORA</div>
  <button onclick="toggleDark()" id="themeBtn" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.08);color:white;padding:7px 14px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s;">🌙 Dark</button>
</div>

<!-- OTP MODAL -->
<div class="modal-bg" id="otpModal">
  <div class="modal">
    <h3>🔐 OTP Verification</h3>
    <p id="otpDesc">Enter the 6-digit OTP</p>
    <div class="otp-boxes" id="otpBoxes">
      <input class="otp-box" maxlength="1">
      <input class="otp-box" maxlength="1">
      <input class="otp-box" maxlength="1">
      <input class="otp-box" maxlength="1">
      <input class="otp-box" maxlength="1">
      <input class="otp-box" maxlength="1">
    </div>
    <div class="otp-timer" id="otpTimer">Resend in 60s</div>
    <div id="otpStep1">
      <button class="btn" onclick="verifyOTP()" style="margin-bottom:10px;">✅ Verify OTP</button>
      <p style="color:#fca5a5;font-size:12px;margin-top:6px;display:none;" id="otpErr"></p>
    </div>
    <div id="otpStep2" style="display:none;">
      <p style="color:#86efac;font-size:13px;margin-bottom:12px;">✅ OTP Verified! Set new password:</p>
      <input type="password" id="newPassInp" placeholder="New password" class="inp" style="margin-bottom:10px;">
      <input type="password" id="newPassConfirm" placeholder="Confirm password" class="inp" style="margin-bottom:12px;">
      <button class="btn" onclick="saveNewPassword()" style="margin-bottom:8px;">🔑 Reset Password</button>
      <p style="color:#fca5a5;font-size:12px;display:none;" id="passErr"></p>
    </div>
    <button class="cancel-btn" onclick="closeOTPModal()">Cancel</button>
  </div>
</div>

<div class="page">
  <div class="card" id="card">
    <div class="loading-overlay" id="loader"><div class="spinner"></div><span style="font-size:14px;font-weight:600;">Authenticating...</span></div>

    <div class="card-logo">APTIORA</div>
    <div class="card-sub">ONLINE EXAM SYSTEM</div>

    <div class="tabs">
      <div class="tab active" id="tab-student" onclick="switchTab('student')">🎓 Student</div>
      <div class="tab" id="tab-admin" onclick="switchTab('admin')">🔐 Admin</div>
    </div>

    <!-- STUDENT -->
    <div class="form-section active" id="studentForm">
      <div class="inp-wrap">
        <label class="inp-label">Register Number</label>
        <input class="inp" type="text" id="s_reg" placeholder="Enter your register no" autocomplete="off">
      </div>
      <div class="inp-wrap">
        <label class="inp-label">Password</label>
        <input class="inp" type="password" id="s_pass" placeholder="Enter password">
        <span class="eye" onclick="toggleEye('s_pass','s_eye')" id="s_eye">👁</span>
      </div>
      <div class="forgot-link" onclick="openForgot()">Forgot Password?</div>
      <button class="btn" onclick="studentLogin()">Sign In →</button>
      <p class="err-msg" id="s_err">❌ Invalid Register No or Password</p>
      <p class="success-msg" id="s_ok">✅ Login Successful!</p>
    </div>

    <!-- ADMIN -->
    <div class="form-section" id="adminForm">
      <div class="inp-wrap">
        <label class="inp-label">Admin Username</label>
        <input class="inp" type="text" id="a_user" placeholder="Enter admin username" autocomplete="off">
      </div>
      <div class="inp-wrap">
        <label class="inp-label">Password</label>
        <input class="inp" type="password" id="a_pass" placeholder="Enter password">
        <span class="eye" onclick="toggleEye('a_pass','a_eye')" id="a_eye">👁</span>
      </div>
      <button class="btn" onclick="adminLogin()">🔐 Admin Access</button>
      <p class="err-msg" id="a_err">❌ Wrong admin credentials</p>
    </div>
  </div>
</div>

<script>
let _dm=localStorage.getItem('darkMode')||(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');if(_dm==='light')document.body.classList.add('light-mode');
function toggleDark(){
  let isLight=document.body.classList.toggle("light-mode");
  localStorage.setItem("darkMode",isLight?"light":"dark");
  let btn=document.getElementById("themeBtn");
  if(btn)btn.innerText=isLight?"☀️ Light":"🌙 Dark";
}
// Apply correct button text on load
(function(){let btn=document.getElementById("themeBtn");if(btn)btn.innerText=localStorage.getItem("darkMode")==="light"?"☀️ Light":"🌙 Dark";})();
function getUsers(){
  return JSON.parse(localStorage.getItem("users"))||{
    "714524205005":{name:"Balaji",password:"1234",dept:"IT",batch:"2024-2028",email:""},
    "714524205053":{name:"Vicky",password:"1234",dept:"IT",batch:"2024-2028",email:""},
    "714524205027":{name:"Ismail",password:"1234",dept:"IT",batch:"2024-2028",email:""},
    "714524205041":{name:"Sakthivel",password:"1234",dept:"IT",batch:"2024-2028",email:""}
  };
}
function getSettings(){return JSON.parse(localStorage.getItem("adminSettings"))||{adminUsername:"admin@balaji",adminPassword:"balaji@123"};}

function switchTab(tab){
  ["student","admin"].forEach(t=>{
    document.getElementById("tab-"+t).classList.remove("active");
    document.getElementById(t+"Form").classList.remove("active");
  });
  document.getElementById("tab-"+tab).classList.add("active");
  document.getElementById(tab+"Form").classList.add("active");
  clearErrors();
}
function clearErrors(){
  ["s_err","s_ok","a_err"].forEach(id=>document.getElementById(id).style.display="none");
  document.querySelectorAll(".inp").forEach(i=>i.classList.remove("err"));
}
function toggleEye(id,eid){let i=document.getElementById(id);i.type=i.type==="password"?"text":"password";document.getElementById(eid).innerText=i.type==="password"?"👁":"🙈";}
function showLoader(){document.getElementById("loader").style.display="flex";}
function hideLoader(){document.getElementById("loader").style.display="none";}

function studentLogin(){
  clearErrors();
  let reg=document.getElementById("s_reg").value.trim();
  let pass=document.getElementById("s_pass").value.trim();
  if(!reg||!pass){document.getElementById("s_err").innerText="Please fill all fields!";document.getElementById("s_err").style.display="block";return;}
  showLoader();
  let users=getUsers();
  setTimeout(()=>{
    if(users[reg]&&users[reg].password===pass){
      localStorage.setItem("username",reg);localStorage.setItem("name",users[reg].name);
      logActivity(users[reg].name,"Logged in");
      document.getElementById("s_ok").style.display="block";hideLoader();
      setTimeout(()=>location.href="dashboard.html",800);
    } else {
      hideLoader();
      document.getElementById("s_reg").classList.add("err");document.getElementById("s_pass").classList.add("err");
      document.getElementById("s_err").style.display="block";
    }
  },1000);
}
function adminLogin(){
  clearErrors();
  let user=document.getElementById("a_user").value.trim();
  let pass=document.getElementById("a_pass").value.trim();
  let s=getSettings();
  if(user===(s.adminUsername||"admin@balaji")&&pass===(s.adminPassword||"balaji@123")){
    localStorage.setItem("adminLoggedIn","yes");location.href="admin.html";
  } else {
    document.getElementById("a_user").classList.add("err");document.getElementById("a_pass").classList.add("err");
    document.getElementById("a_err").style.display="block";
  }
}

// FORGOT PASSWORD
let forgotReg="",otpTimerInterval;
function openForgot(){
  let reg=document.getElementById("s_reg").value.trim();
  if(!reg){document.getElementById("s_err").innerText="Enter your Register No first!";document.getElementById("s_err").style.display="block";return;}
  let users=getUsers();
  if(!users[reg]){document.getElementById("s_err").innerText="Register No not found!";document.getElementById("s_err").style.display="block";return;}
  let email=users[reg].email||"";
  if(!email){document.getElementById("s_err").innerText="No email registered! Contact admin.";document.getElementById("s_err").style.display="block";return;}
  forgotReg=reg;
  let otp=Math.floor(100000+Math.random()*900000).toString();
  localStorage.setItem("resetOTP_"+reg,otp);localStorage.setItem("resetOTP_expiry",Date.now()+5*60000);
  let masked=email.replace(/(.{2})(.*)(@.*)/,(a,b,cc,d)=>b+"****"+d);
  document.getElementById("otpDesc").innerText="📧 OTP sent to: "+masked;
  console.log("OTP for testing:",otp);
  openOTPModal();
}
function openOTPModal(){
  document.getElementById("otpStep1").style.display="block";document.getElementById("otpStep2").style.display="none";
  if(document.getElementById("otpErr"))document.getElementById("otpErr").style.display="none";
  document.getElementById("otpModal").classList.add("open");
  document.querySelectorAll(".otp-box").forEach((b,i)=>{
    b.value="";b.oninput=()=>{if(b.value&&i<5)document.querySelectorAll(".otp-box")[i+1].focus();};
    b.onkeydown=e=>{if(e.key==="Backspace"&&!b.value&&i>0)document.querySelectorAll(".otp-box")[i-1].focus();};
  });
  document.querySelectorAll(".otp-box")[0].focus();startOTPTimer(60);
}
function closeOTPModal(){document.getElementById("otpModal").classList.remove("open");clearInterval(otpTimerInterval);}
function startOTPTimer(sec){
  clearInterval(otpTimerInterval);let t=sec;
  otpTimerInterval=setInterval(()=>{
    document.getElementById("otpTimer").innerText=t>0?`Resend in ${t}s`:"OTP expired";
    t--;if(t<0)clearInterval(otpTimerInterval);
  },1000);
}
function verifyOTP(){
  let entered=[...document.querySelectorAll(".otp-box")].map(b=>b.value).join("");
  let stored=localStorage.getItem("resetOTP_"+forgotReg);
  let expiry=parseInt(localStorage.getItem("resetOTP_expiry")||0);
  let errEl=document.getElementById("otpErr");
  if(Date.now()>expiry){errEl.innerText="OTP expired!";errEl.style.display="block";return;}
  if(entered===stored){document.getElementById("otpStep1").style.display="none";document.getElementById("otpStep2").style.display="block";document.getElementById("newPassInp").focus();}
  else{errEl.innerText="❌ Wrong OTP! Try again.";errEl.style.display="block";}
}
function saveNewPassword(){
  let np=document.getElementById("newPassInp").value.trim();let nc=document.getElementById("newPassConfirm").value.trim();
  let errEl=document.getElementById("passErr");
  if(!np||np.length<4){errEl.innerText="Min 4 characters!";errEl.style.display="block";return;}
  if(np!==nc){errEl.innerText="❌ Passwords don't match!";errEl.style.display="block";return;}
  let users=getUsers();users[forgotReg].password=np;localStorage.setItem("users",JSON.stringify(users));
  closeOTPModal();document.getElementById("s_ok").innerText="✅ Password reset! Please login.";document.getElementById("s_ok").style.display="block";
}
function logActivity(name,action){
  let logs=JSON.parse(localStorage.getItem("activityLog"))||[];
  logs.unshift({msg:`${name} — ${action}`,color:"#22c55e",time:new Date().toLocaleString()});
  if(logs.length>100)logs=logs.slice(0,100);localStorage.setItem("activityLog",JSON.stringify(logs));
}
document.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    if(document.getElementById("studentForm").classList.contains("active"))studentLogin();else adminLogin();
  }
});

// Particles
const cv=document.getElementById("c"),ctx=cv.getContext("2d");
let W=cv.width=innerWidth,H=cv.height=innerHeight;
class Particle{constructor(){this.reset();}reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.r=Math.random()*1.5+0.3;this.dx=(Math.random()-.5)*.35;this.dy=(Math.random()-.5)*.35;this.a=Math.random()*.5+0.1;}
draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${this.a})`;ctx.fill();}
update(){this.x+=this.dx;this.y+=this.dy;if(this.x<0||this.x>W||this.y<0||this.y>H)this.reset();this.draw();}}
const P=Array.from({length:80},()=>new Particle());const maxD=130;
function draw(){ctx.clearRect(0,0,W,H);P.forEach(p=>p.update());
  for(let i=0;i<P.length;i++)for(let j=i+1;j<P.length;j++){let d=Math.hypot(P[i].x-P[j].x,P[i].y-P[j].y);if(d<maxD){ctx.beginPath();ctx.strokeStyle=`rgba(124,58,237,${(1-d/maxD)*0.15})`;ctx.lineWidth=0.8;ctx.moveTo(P[i].x,P[i].y);ctx.lineTo(P[j].x,P[j].y);ctx.stroke();}}
  requestAnimationFrame(draw);}
draw();
addEventListener("resize",()=>{W=cv.width=innerWidth;H=cv.height=innerHeight;});
document.addEventListener("mousemove",e=>{let x=(e.clientX/W-.5)*20,y=(e.clientY/H-.5)*20;document.querySelector(".orb1").style.transform=`translate(${x}px,${y}px)`;document.querySelector(".orb2").style.transform=`translate(${-x}px,${-y}px)`;});
</script>
</body>
</html>
