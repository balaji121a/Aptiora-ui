<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Certificate — APTIORA</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="aptiora.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&display=swap');
.cert-card{width:820px;max-width:95vw;background:white;color:#222;border-radius:18px;box-shadow:0 24px 80px rgba(0,0,0,0.6);overflow:hidden;position:relative;animation:scaleIn 0.7s ease;}
.cert-card.r1{border:8px solid #d4af37;}.cert-card.r2{border:8px solid #94a3b8;}.cert-card.r3{border:8px solid #cd7f32;}.cert-card.rp{border:8px solid #6366f1;}
.cert-hd{padding:26px 38px 18px;text-align:center;}
.cert-card.r1 .cert-hd{background:linear-gradient(135deg,#f6d365,#fda085,#f6d365);}
.cert-card.r2 .cert-hd{background:linear-gradient(135deg,#bdc3c7,#95a5a6,#bdc3c7);}
.cert-card.r3 .cert-hd{background:linear-gradient(135deg,#cd7f32,#e8a838,#cd7f32);}
.cert-card.rp .cert-hd{background:linear-gradient(135deg,#6366f1,#8b5cf6,#6366f1);}
.cert-hd h2{font-family:'Playfair Display',serif;font-size:34px;font-weight:900;letter-spacing:5px;color:white;text-shadow:0 2px 8px rgba(0,0,0,0.3);}
.medal{font-size:68px;display:block;text-align:center;margin:-14px auto 6px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.3));animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.cert-body{padding:10px 46px 24px;text-align:center;}
.cert-name{font-family:'Playfair Display',serif;font-size:40px;font-weight:700;color:#1a1a1a;letter-spacing:2px;margin:12px 0;display:inline-block;border-bottom:3px solid;padding-bottom:5px;}
.cert-card.r1 .cert-name{border-color:#d4af37;}.cert-card.r2 .cert-name{border-color:#94a3b8;}.cert-card.r3 .cert-name{border-color:#cd7f32;}.cert-card.rp .cert-name{border-color:#6366f1;}
.rank-badge-c{display:inline-block;padding:6px 20px;border-radius:30px;font-size:15px;font-weight:700;margin:8px 0;color:white;}
.cert-card.r1 .rank-badge-c{background:linear-gradient(135deg,#d4af37,#f6e27a);}.cert-card.r2 .rank-badge-c{background:linear-gradient(135deg,#94a3b8,#cbd5e1);}.cert-card.r3 .rank-badge-c{background:linear-gradient(135deg,#cd7f32,#e8a838);}.cert-card.rp .rank-badge-c{background:linear-gradient(135deg,#6366f1,#8b5cf6);}
.cert-msg{font-size:14px;color:#555;font-style:italic;margin:6px 0 12px;}
.cert-meta-row{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin:12px 0;}
.meta-p{background:#f8fafc;border:1px solid #e2e8f0;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:500;color:#374151;}
.cert-foot{display:flex;justify-content:space-around;padding:0 46px 20px;margin-top:6px;}
.sig-block{text-align:center;}
.sig-line{border-top:1.5px solid #999;width:140px;margin:0 auto 5px;}
.sig-lbl{font-size:11px;color:#888;}
.cert-card::before{content:"";position:absolute;top:10px;left:10px;right:10px;bottom:10px;border:1.5px dashed rgba(0,0,0,0.07);border-radius:12px;pointer-events:none;}
.corner-star{position:absolute;font-size:22px;color:rgba(0,0,0,0.07);}
.corner-star.tl{top:18px;left:18px;}.corner-star.tr{top:18px;right:18px;}.corner-star.bl{bottom:18px;left:18px;}.corner-star.br{bottom:18px;right:18px;}
.not-elig{text-align:center;color:var(--tx);padding:60px 28px;animation:scaleIn 0.5s ease;}
@media(max-width:860px){.cert-card{border-width:5px;}.cert-hd h2{font-size:24px;}.cert-name{font-size:30px;}.cert-body{padding:10px 20px 20px;}.cert-foot{padding:0 20px 16px;}}
body.light .not-elig{color:var(--tx);}
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div>
<canvas class="bg-canvas" id="bgCanvas"></canvas>
<div id="sb"></div>
<div class="app-main" id="appMain">
  <div class="app-topbar">
    <div class="topbar-left"><button class="collapse-btn" id="collapseBtn">☰</button><div class="page-title">🎓 Certificate</div></div>
    <div class="topbar-right"><button class="tb-btn" id="themeBtn">🌙</button></div>
  </div>
  <div class="app-page" style="display:flex;flex-direction:column;align-items:center;">
    <div id="certSection" style="width:100%;display:flex;flex-direction:column;align-items:center;">
      <div id="certificate" class="cert-card">
        <span class="corner-star tl">✦</span><span class="corner-star tr">✦</span><span class="corner-star bl">✦</span><span class="corner-star br">✦</span>
        <div class="cert-hd"><h2>CERTIFICATE</h2></div>
        <div class="medal" id="medal"></div>
        <div class="cert-body">
          <p style="font-size:15px;color:#555;">This is to proudly certify that</p>
          <div class="cert-name" id="certName"></div>
          <div class="rank-badge-c" id="rankBadge"></div>
          <p class="cert-msg" id="certMsg"></p>
          <div class="cert-meta-row">
            <div class="meta-p">📊 Score: <strong id="certScore"></strong></div>
            <div class="meta-p">📅 <span id="certDate"></span></div>
            <div class="meta-p">🏫 APTIORA</div>
          </div>
        </div>
        <div class="cert-foot">
          <div class="sig-block"><div class="sig-line"></div><div class="sig-lbl">Examiner Signature</div></div>
          <div class="sig-block"><div class="sig-line"></div><div class="sig-lbl">Director, APTIORA</div></div>
        </div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:20px;">
        <button class="btn btn-primary" id="dlBtn" onclick="downloadPDF()">⬇ Download PDF</button>
        <button class="btn btn-success" onclick="shareCert()">📱 Share</button>
        <button class="btn btn-secondary" onclick="nav('leaderboard.html')">🏆 Leaderboard</button>
      </div>
    </div>
    <div id="notElig" class="not-elig" style="display:none;">
      <div style="font-size:60px;margin-bottom:16px;">⚠️</div>
      <div style="font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;margin-bottom:10px;">Not Eligible</div>
      <p style="opacity:0.7;margin-bottom:6px;">You need at least <strong>15 questions</strong> attempted.</p>
      <p>Your attempts: <strong id="attCnt"></strong> / 20</p>
      <button class="btn btn-secondary" onclick="nav('leaderboard.html')" style="margin-top:20px;">⬅ Leaderboard</button>
    </div>
  </div>
</div>
<script src="aptiora.js"></script>
<script>
let user=getCurrentUser();if(!user)throw'';
let {reg,name}=user;
document.getElementById('sb').innerHTML=buildSidebar('',name,reg);
initSidebar();
let rank=parseInt(localStorage.getItem('rank'))||0,score=parseInt(localStorage.getItem('cert_score'))||0,attempted=parseInt(localStorage.getItem('cert_attempted'))||0;
let s=getSettings();
if(attempted<15){document.getElementById('certSection').style.display='none';document.getElementById('notElig').style.display='block';document.getElementById('attCnt').innerText=attempted;}
else{
  document.getElementById('certName').innerText=name;
  document.getElementById('certScore').innerText=score+' / 20';
  document.getElementById('certDate').innerText=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  let card=document.getElementById('certificate'),medal=document.getElementById('medal'),badge=document.getElementById('rankBadge'),msg=document.getElementById('certMsg');
  if(rank===1){card.classList.add('r1');medal.innerText='🥇';badge.innerText='🏆 1st Place — Gold';msg.innerText='has achieved the Highest Score in the Assessment';}
  else if(rank===2){card.classList.add('r2');medal.innerText='🥈';badge.innerText='🥈 2nd Place — Silver';msg.innerText='has achieved an Outstanding Performance in the Assessment';}
  else if(rank===3){card.classList.add('r3');medal.innerText='🥉';badge.innerText='🥉 3rd Place — Bronze';msg.innerText='has achieved an Excellent Performance in the Assessment';}
  else{card.classList.add('rp');medal.innerText='🎓';badge.innerText='🎓 Participation Certificate';msg.innerText='has successfully completed the Assessment';}
  if(!s.certDownload){let b=document.getElementById('dlBtn');b.disabled=true;b.innerText='⛔ Download Disabled';}
  setTimeout(()=>{launchConfetti(120);if(rank<=3&&rank>0){setTimeout(()=>launchConfetti(60),600);}},500);
}
async function downloadPDF(){
  if(!getSettings().certDownload){alert('⛔ Download disabled by admin.');return;}
  launchConfetti(80);
  const {jsPDF}=window.jspdf;
  let el=document.getElementById('certificate');
  document.querySelector('.app-page').querySelectorAll('.btn').forEach(b=>b.style.display='none');
  let cv=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#ffffff'});
  document.querySelector('.app-page').querySelectorAll('.btn').forEach(b=>b.style.display='');
  let img=cv.toDataURL('image/png');
  let pdf=new jsPDF('landscape','px',[cv.width/2,cv.height/2]);
  pdf.addImage(img,'PNG',0,0,cv.width/2,cv.height/2);
  pdf.save('Certificate_'+name+'_APTIORA.pdf');
}
function shareCert(){
  let txt=`I scored ${score}/20 in APTIORA Aptitude Assessment! 🎓 #APTIORA #Placement`;
  if(navigator.share){navigator.share({title:'APTIORA Certificate',text:txt}).catch(()=>{});}
  else{navigator.clipboard.writeText(txt).then(()=>alert('✅ Copied! Paste in WhatsApp or LinkedIn.')).catch(()=>alert(txt));}
}
</script>
</body>
</html>
