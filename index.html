<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#7c3aed">
<title>APTIORA — Aptitude Online Examination</title>
<link rel="stylesheet" href="aptiora.css">
<style>
html,body{height:100%;overflow:hidden;}
.hero{position:relative;z-index:10;width:100%;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
.logo-wrap{margin-bottom:10px;animation:scaleIn 0.7s ease;}
.logo-icon{font-size:70px;display:block;margin-bottom:12px;}
.logo-text{font-family:'Space Grotesk',sans-serif;font-size:clamp(42px,9vw,80px);font-weight:900;letter-spacing:5px;background:linear-gradient(135deg,#fff 20%,var(--gold) 60%,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.tagline{font-family:'Space Grotesk',sans-serif;font-size:clamp(15px,3vw,20px);color:var(--text2);margin:14px 0 8px;animation:fadeUp 0.7s ease 0.15s both;letter-spacing:0.5px;}
.sub-tagline{font-size:clamp(12px,2vw,14px);color:var(--text3);margin-bottom:36px;animation:fadeUp 0.7s ease 0.2s both;}
.feature-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:500px;margin:0 auto 36px;animation:fadeUp 0.7s ease 0.25s both;}
@media(max-width:480px){.feature-grid{grid-template-columns:repeat(2,1fr);}}
.feat-item{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 10px;text-align:center;transition:all 0.2s;}
.feat-item:hover{background:rgba(124,58,237,0.1);border-color:rgba(124,58,237,0.3);transform:translateY(-2px);}
.feat-icon{font-size:22px;display:block;margin-bottom:5px;}
.feat-name{font-size:11px;font-weight:600;color:var(--text2);}
.cta-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;animation:fadeUp 0.7s ease 0.35s both;}
.cta-primary{padding:15px 42px;font-size:16px;font-weight:700;border:none;border-radius:var(--radius-lg);background:linear-gradient(135deg,var(--purple),#6d28d9);color:white;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.3s;box-shadow:0 8px 28px rgba(124,58,237,0.4);}
.cta-primary:hover{transform:translateY(-3px);box-shadow:0 14px 36px rgba(124,58,237,0.5);}
.cta-secondary{padding:15px 28px;font-size:15px;font-weight:700;border:1px solid var(--border2);border-radius:var(--radius-lg);background:rgba(255,255,255,0.07);color:white;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.3s;}
.cta-secondary:hover{background:rgba(255,255,255,0.12);}
.footer-note{margin-top:28px;font-size:11px;color:var(--text3);animation:fadeUp 0.7s ease 0.45s both;letter-spacing:0.5px;}
.college-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.25);border-radius:20px;padding:6px 16px;font-size:12px;color:#a78bfa;font-weight:600;margin-bottom:24px;animation:fadeUp 0.7s ease 0.1s both;}
body.light .feat-item{background:rgba(0,0,0,0.04)!important;border-color:rgba(0,0,0,0.08)!important;}
body.light .feat-name{color:rgba(26,26,46,0.6)!important;}
body.light .cta-secondary{background:rgba(0,0,0,0.05)!important;border-color:rgba(0,0,0,0.12)!important;color:#1a1a2e!important;}
body.light .footer-note{color:rgba(26,26,46,0.35)!important;}
body.light .college-badge{background:rgba(124,58,237,0.08)!important;}
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
<canvas class="bg-canvas" id="bgCanvas"></canvas>
<div class="hero">
  <div class="logo-wrap">
    <span class="logo-icon">📘</span>
    <div class="logo-text">APTIORA</div>
  </div>
  <div class="tagline">Aptitude Online Examination Portal</div>
  <div class="sub-tagline">Practice · Assess · Excel · Get Placed</div>
  <div class="college-badge">🏫 B.Tech Placement Training System</div>
  <div class="feature-grid">
    <div class="feat-item"><span class="feat-icon">📖</span><div class="feat-name">Aptitude</div></div>
    <div class="feat-item"><span class="feat-icon">💻</span><div class="feat-name">Coding</div></div>
    <div class="feat-item"><span class="feat-icon">🗣</span><div class="feat-name">English</div></div>
    <div class="feat-item"><span class="feat-icon">🔬</span><div class="feat-name">Technical</div></div>
    <div class="feat-item"><span class="feat-icon">🎤</span><div class="feat-name">Interview</div></div>
    <div class="feat-item"><span class="feat-icon">🏢</span><div class="feat-name">Placement</div></div>
  </div>
  <div class="cta-row">
    <button class="cta-primary" onclick="nav('login.html')">🚀 Login to Portal</button>
    <button class="cta-secondary" onclick="nav('admin.html')">⚙️ Admin</button>
  </div>
  <div class="footer-note">AI-POWERED · SECURE ASSESSMENT · PWA ENABLED</div>
</div>
<script src="aptiora.js"></script>
<script>// Auto redirect
if(localStorage.getItem('username')) nav('dashboard.html');
else if(localStorage.getItem('adminLoggedIn')==='yes') nav('admin.html');</script>
</body>
</html>
