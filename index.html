<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>APTIORA — Placement Training Portal</title>
<link rel="stylesheet" href="aptiora.css">
<style>
html,body{height:100%;overflow:hidden;}
.hero{position:relative;z-index:10;width:100%;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
.logo{font-family:'Space Grotesk',sans-serif;font-size:clamp(36px,8vw,72px);font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,#fff 30%,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px;animation:scaleIn 0.7s ease;}
.tagline{font-size:clamp(14px,3vw,20px);color:var(--text2);margin-bottom:40px;animation:fadeUp 0.7s ease 0.15s both;}
.feature-chips{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:36px;animation:fadeUp 0.7s ease 0.25s both;}
.cta-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;animation:fadeUp 0.7s ease 0.35s both;}
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
<canvas class="bg-canvas" id="bgCanvas"></canvas>
<div class="hero">
  <div style="font-size:56px;margin-bottom:12px;animation:scaleIn 0.6s ease">📘</div>
  <div class="logo">APTIORA</div>
  <div class="tagline">Complete Placement Training Portal for B.Tech Students</div>
  <div class="feature-chips">
    <span class="badge badge-purple">📖 Aptitude</span>
    <span class="badge badge-blue">💻 Coding</span>
    <span class="badge badge-green">🗣 English</span>
    <span class="badge badge-gold">🔬 Technical</span>
    <span class="badge badge-red">🎤 Mock Interview</span>
    <span class="badge" style="background:rgba(6,182,212,0.15);border-color:rgba(6,182,212,0.3);color:#67e8f9">🏢 Placement</span>
  </div>
  <div class="cta-row">
    <button class="btn btn-primary" style="padding:14px 36px;font-size:15px;" onclick="nav('login.html')">🚀 Get Started</button>
    <button class="btn btn-secondary" style="padding:14px 28px;font-size:15px;" onclick="nav('admin.html')">⚙️ Admin Panel</button>
  </div>
  <div style="margin-top:32px;font-size:12px;color:var(--text2);animation:fadeUp 0.7s ease 0.45s both;">AI-powered · 30+ features · Mobile ready</div>
</div>
<script src="aptiora.js"></script>
<script>if(localStorage.getItem('username'))nav('dashboard.html');</script>
</body>
</html>
