<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin — APTIORA</title>
<link rel="stylesheet" href="aptiora.css">
<style>
:root{--sidebar-w:220px;}
.adm-sidebar{position:fixed;top:0;left:0;height:100vh;width:var(--sidebar-w);background:rgba(10,10,16,0.95);backdrop-filter:blur(24px);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:200;overflow:hidden;transition:transform var(--ease);}
.adm-sidebar.mob-open{transform:translateX(0);}
.adm-logo{padding:18px 16px;border-bottom:1px solid var(--border);font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:800;letter-spacing:2px;background:linear-gradient(135deg,#fff 30%,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.adm-nav{flex:1;overflow-y:auto;padding:10px 8px;display:flex;flex-direction:column;gap:2px;}
.adm-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:13px;transition:all var(--ease);border:1px solid transparent;}
.adm-item:hover{background:rgba(124,58,237,0.1);color:white;}
.adm-item.on{background:rgba(124,58,237,0.18);color:white;border-color:rgba(124,58,237,0.3);font-weight:600;}
.adm-main{margin-left:var(--sidebar-w);min-height:100vh;position:relative;z-index:10;transition:margin-left var(--ease);}
.adm-topbar{height:64px;padding:0 22px;display:flex;align-items:center;justify-content:space-between;background:rgba(5,5,8,0.72);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.notif-badge{display:inline-block;background:#ef4444;color:white;font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;margin-left:auto;}
.ham-btn{display:none;background:rgba(255,255,255,0.07);border:1px solid var(--border);color:white;width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:16px;align-items:center;justify-content:center;}
.stat-card-adm{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;}
.stat-val-adm{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:800;}
.stat-lbl-adm{font-size:12px;color:var(--text2);margin-top:3px;}
table{width:100%;border-collapse:collapse;}
th{background:rgba(124,58,237,0.1);padding:11px 16px;text-align:left;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;}
tr:hover td{background:rgba(255,255,255,0.02);}
tr:last-child td{border-bottom:none;}
.notif-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9000;display:none;align-items:center;justify-content:center;padding:20px;}
.notif-modal{background:rgba(13,13,20,0.98);backdrop-filter:blur(24px);border:1px solid var(--border2);border-radius:var(--radius-xl);padding:32px;width:480px;max-width:100%;}
@media(max-width:768px){.ham-btn{display:flex;}.adm-sidebar{transform:translateX(-100%);}.adm-main{margin-left:0;}.stat-grid{grid-template-columns:1fr 1fr!important;}}
body.light .adm-sidebar{background:rgba(255,255,255,0.95)!important;}
body.light .adm-topbar{background:rgba(240,242,247,0.88)!important;}
body.light td{color:#1a1a2e!important;}
body.light .glass-card{color:#1a1a2e!important;}
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div>
<canvas class="bg-canvas" id="bgCanvas"></canvas>
<div class="mobile-overlay" id="mobOvl" onclick="closeSidebar()"></div>

<div class="adm-sidebar" id="admSidebar">
  <div class="adm-logo">⚙️ APTIORA ADMIN</div>
  <div class="adm-nav">
    <div class="adm-item on" onclick="showSec('dashboard',this)">📊 Dashboard</div>
    <div class="adm-item" onclick="showSec('users',this)">👥 Users</div>
    <div class="adm-item" onclick="showSec('questions',this)">❓ Questions</div>
    <div class="adm-item" onclick="showSec('leaderboard',this)">🏆 Leaderboard</div>
    <div class="adm-item" onclick="showSec('batches',this)">🏫 Batches</div>
    <div class="adm-item" onclick="showSec('notifications',this)">🔔 Notifications</div>
    <div class="adm-item" onclick="showSec('settings',this)">⚙️ Settings</div>
  </div>
  <div style="padding:10px 8px;border-top:1px solid var(--border);"><button class="btn btn-danger btn-full btn-sm" onclick="admLogout()">🚪 Logout</button></div>
</div>

<div class="adm-main" id="admMain">
  <div class="adm-topbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="ham-btn" id="hamBtn" onclick="toggleSidebar()">☰</button>
      <div id="pageTitle" style="font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;">📊 Dashboard</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="badge badge-purple">ADMIN</span>
      <button class="tb-btn" id="themeBtn">🌙</button>
    </div>
  </div>
  <div style="padding:24px;" id="secContent"></div>
</div>

<div class="notif-overlay" id="notifModal">
  <div class="notif-modal">
    <div style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin-bottom:16px;">🔔 Send Notification</div>
    <div class="form-group"><label class="form-label">Message</label><textarea class="form-input" id="notifMsg" placeholder="Type announcement..." rows="3"></textarea></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="sendNotif()">📤 Send to All</button>
      <button class="btn btn-secondary" onclick="document.getElementById('notifModal').style.display='none'">Cancel</button>
    </div>
  </div>
</div>

<script src="aptiora.js"></script>
<script>
// Admin auth
(function(){let m=localStorage.getItem('darkMode')||(window.matchMedia&&window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');if(m==='light')document.body.classList.add('light');let btn=document.getElementById('themeBtn');if(btn)btn.innerText=m==='light'?'☀️':'🌙';btn.onclick=()=>{let l=document.body.classList.toggle('light');localStorage.setItem('darkMode',l?'light':'dark');btn.innerText=l?'☀️':'🌙';};})();
initParticles('bgCanvas');
let creds=JSON.parse(localStorage.getItem('adminCreds'))||{user:'admin',pass:'admin123'};
if(localStorage.getItem('adminLoggedIn')!=='yes'){
  document.getElementById('secContent').innerHTML=`<div style="max-width:380px;margin:40px auto"><div class="glass-card"><div style="font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;text-align:center;margin-bottom:20px">Admin Login</div><div class="form-group"><label class="form-label">Username</label><input class="form-input" id="aUser" placeholder="admin"></div><div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" id="aPass" placeholder="Password"></div><button class="btn btn-primary btn-full" onclick="admLogin()">🔐 Login</button><div style="color:#fca5a5;font-size:13px;margin-top:10px;display:none" id="aErr">Wrong credentials</div></div></div>`;
  document.addEventListener('keydown',e=>{if(e.key==='Enter')admLogin();});
}else{renderDashboard();}
function admLogin(){let u=document.getElementById('aUser')?.value,p=document.getElementById('aPass')?.value;if(u===creds.user&&p===creds.pass){localStorage.setItem('adminLoggedIn','yes');renderDashboard();}else{let e=document.getElementById('aErr');if(e)e.style.display='block';}}
function admLogout(){localStorage.removeItem('adminLoggedIn');location.href='login.html';}
function toggleSidebar(){let s=document.getElementById('admSidebar'),o=document.getElementById('mobOvl');s.classList.toggle('mob-open');o.classList.toggle('on');}
function closeSidebar(){document.getElementById('admSidebar').classList.remove('mob-open');document.getElementById('mobOvl').classList.remove('on');}
function showSec(sec,el){document.querySelectorAll('.adm-item').forEach(i=>i.classList.remove('on'));el.classList.add('on');closeSidebar();let titles={dashboard:'📊 Dashboard',users:'👥 Users',questions:'❓ Questions',leaderboard:'🏆 Leaderboard',batches:'🏫 Batches',notifications:'🔔 Notifications',settings:'⚙️ Settings'};document.getElementById('pageTitle').innerText=titles[sec]||sec;if(sec==='dashboard')renderDashboard();else if(sec==='users')renderUsers();else if(sec==='questions')renderQuestions();else if(sec==='leaderboard')renderLeaderboard();else if(sec==='batches')renderBatches();else if(sec==='notifications')renderNotifications();else if(sec==='settings')renderSettings();}
function getUsers(){return JSON.parse(localStorage.getItem('users'))||{'714524205005':{name:'Balaji',dept:'IT',batch:'2024-2028',password:'1234'},'714524205053':{name:'Vicky',dept:'IT',batch:'2024-2028',password:'1234'},'714524205027':{name:'Ismail',dept:'IT',batch:'2024-2028',password:'1234'},'714524205041':{name:'Sakthivel',dept:'IT',batch:'2024-2028',password:'1234'}};}
function getSettings(){return JSON.parse(localStorage.getItem('adminSettings'))||{assessTime:45,secureCode:'123456',antiCheat:true,forceFullscreen:true,shuffleQ:true,certDownload:true,courseStart:'25 Mar 2026',courseEnd:'05 Apr 2026'};}
function getQBank(){return JSON.parse(localStorage.getItem('questionBank'))||{};}
function showNotif(msg,t='success'){let n=document.createElement('div');n.style.cssText='position:fixed;bottom:20px;right:20px;background:'+(t==='success'?'rgba(16,185,129,0.9)':'rgba(239,68,68,0.9)')+';color:white;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;animation:scaleIn 0.3s ease';n.innerText=msg;document.body.appendChild(n);setTimeout(()=>n.remove(),2800);}
function renderDashboard(){
  let users=getUsers(),board=JSON.parse(localStorage.getItem('leaderboard'))||[],qb=getQBank();
  let totalQ=Object.values(qb).reduce((s,arr)=>s+arr.length,0);
  let assessed=Object.keys(users).filter(r=>localStorage.getItem('assessTaken_'+r)==='yes').length;
  document.getElementById('secContent').innerHTML=`
  <div class="grid4 stat-grid" style="margin-bottom:20px;">
    <div class="stat-card-adm"><div style="font-size:22px;margin-bottom:6px">👥</div><div class="stat-val-adm">${Object.keys(users).length}</div><div class="stat-lbl-adm">Total Students</div></div>
    <div class="stat-card-adm"><div style="font-size:22px;margin-bottom:6px">📝</div><div class="stat-val-adm">${assessed}</div><div class="stat-lbl-adm">Assessed</div></div>
    <div class="stat-card-adm"><div style="font-size:22px;margin-bottom:6px">❓</div><div class="stat-val-adm">${totalQ}</div><div class="stat-lbl-adm">Total Questions</div></div>
    <div class="stat-card-adm"><div style="font-size:22px;margin-bottom:6px">🏆</div><div class="stat-val-adm">${board.length}</div><div class="stat-lbl-adm">In Leaderboard</div></div>
  </div>
  <div class="glass-card" style="margin-bottom:16px"><div style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;margin-bottom:14px">🏆 Top Performers</div>${board.sort((a,b)=>b.score-a.score).slice(0,5).map((u,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)"><div style="font-size:18px;width:26px">${['🥇','🥈','🥉'][i]||'#'+(i+1)}</div><div style="flex:1;font-size:13px;font-weight:500">${u.name}</div><div style="font-weight:700;color:#f5c842">${u.score}/20</div></div>`).join('') || '<div style="color:var(--text2);font-size:13px;text-align:center;padding:16px">No results yet</div>'}</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;">
    <button class="btn btn-primary" onclick="document.getElementById('notifModal').style.display='flex'">🔔 Send Notification</button>
    <button class="btn btn-secondary" onclick="exportAllCSV()">📊 Export Results</button>
    <button class="btn btn-secondary" onclick="clearLeaderboard()">🗑 Clear Leaderboard</button>
  </div>`;
}
function renderUsers(){
  let users=getUsers();
  document.getElementById('secContent').innerHTML=`<div class="glass-card" style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px"><div style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700">👥 Student Accounts</div><button class="btn btn-primary btn-sm" onclick="addUser()">+ Add User</button></div><div style="overflow-x:auto"><table><thead><tr><th>Reg No</th><th>Name</th><th>Dept</th><th>Batch</th><th>Assessment</th><th>Progress</th><th>Action</th></tr></thead><tbody>${Object.entries(users).map(([r,u])=>{let p1=parseInt(localStorage.getItem('p1_done_'+r))||0,p2=parseInt(localStorage.getItem('p2_done_'+r))||0,p3=parseInt(localStorage.getItem('p3_done_'+r))||0,overall=Math.floor((p1+p2+p3)/3),taken=localStorage.getItem('assessTaken_'+r)==='yes';return`<tr><td style="font-family:'Courier New',monospace;font-size:12px">${r}</td><td><strong>${u.name}</strong></td><td>${u.dept||'IT'}</td><td>${u.batch||'2024-2028'}</td><td><span class="badge ${taken?'badge-green':'badge-red'}">${taken?'✅ Done':'⏳ Pending'}</span></td><td>${overall}%</td><td><button class="btn btn-danger btn-sm" onclick="delUser('${r}')">🗑</button></td></tr>`;}).join('')}</tbody></table></div></div>`;
}
function addUser(){let r=prompt('Register Number:');if(!r)return;let n=prompt('Student Name:');if(!n)return;let users=getUsers();users[r]={name:n,dept:'IT',batch:'2024-2028',password:'1234'};localStorage.setItem('users',JSON.stringify(users));showNotif('✅ User added!');renderUsers();}
function delUser(r){if(!confirm('Delete this user?'))return;let users=getUsers();delete users[r];localStorage.setItem('users',JSON.stringify(users));showNotif('🗑 Deleted','error');renderUsers();}
function renderQuestions(){
  let qb=getQBank();let cats=['Verbal Ability','Algebra','Series & Sequence','Assessment'];
  document.getElementById('secContent').innerHTML=`
  <div class="glass-card" style="margin-bottom:14px;border-color:rgba(124,58,237,0.25);background:rgba(124,58,237,0.06)">
    <div style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;margin-bottom:14px">🤖 AI Question Generator</div>
    <div class="grid2" style="margin-bottom:12px">
      <div class="form-group" style="margin:0"><label class="form-label">Category</label><select class="form-input" id="aiQCat">${cats.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div class="form-group" style="margin:0"><label class="form-label">Count</label><select class="form-input" id="aiQCount"><option value="5">5</option><option value="10" selected>10</option><option value="15">15</option></select></div>
      <div class="form-group" style="margin:0"><label class="form-label">Difficulty</label><select class="form-input" id="aiQDiff"><option value="easy">Easy</option><option value="medium" selected>Medium</option><option value="hard">Hard</option></select></div>
    </div>
    <button class="btn btn-primary" onclick="generateAIQ()" id="aiQBtn">✨ Generate Questions</button>
    <div id="aiQStatus" style="margin-top:10px;font-size:13px;display:none"></div>
  </div>
  <div class="glass-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700">❓ Question Bank</div>
      <select class="form-input" id="qFilter" onchange="renderQuestions()" style="width:180px;padding:8px 12px">${['all',...cats].map(c=>`<option value="${c}">${c==='all'?'All Categories':c}</option>`).join('')}</select>
    </div>
    <div style="overflow-x:auto"><table><thead><tr><th>#</th><th>Question</th><th>Category</th><th>Answer</th><th>Action</th></tr></thead><tbody id="qTbody"></tbody></table></div>
  </div>`;
  renderQTable();
}
function renderQTable(){let qb=getQBank();let filter=document.getElementById('qFilter')?.value||'all';let rows=[];Object.entries(qb).forEach(([cat,qs])=>{if(filter==='all'||filter===cat){qs.forEach((q,i)=>{rows.push({cat,q,i});});}});document.getElementById('qTbody').innerHTML=rows.slice(0,50).map((r,idx)=>`<tr><td style="color:var(--text2)">${idx+1}</td><td style="max-width:280px">${r.q.q.slice(0,60)}${r.q.q.length>60?'...':''}</td><td><span class="badge badge-purple" style="font-size:10px">${r.cat}</span></td><td style="color:#86efac">${r.q.o[r.q.a]}</td><td><button class="btn btn-danger btn-sm" onclick="delQ('${r.cat}',${r.i})">✕</button></td></tr>`).join('')||'<tr><td colspan="5" style="text-align:center;color:var(--text2);padding:20px">No questions. Use AI Generator above!</td></tr>';}
function delQ(cat,i){let qb=getQBank();qb[cat].splice(i,1);localStorage.setItem('questionBank',JSON.stringify(qb));renderQTable();showNotif('🗑 Deleted','error');}
async function generateAIQ(){
  let cat=document.getElementById('aiQCat').value,count=document.getElementById('aiQCount').value,diff=document.getElementById('aiQDiff').value;
  let btn=document.getElementById('aiQBtn'),status=document.getElementById('aiQStatus');
  btn.disabled=true;btn.innerText='Generating...';status.style.display='block';status.style.color='rgba(255,255,255,0.6)';status.innerText='🤖 Creating '+count+' '+diff+' questions for '+cat+'...';
  try{let resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1800,messages:[{role:'user',content:`Generate exactly ${count} MCQ aptitude questions for "${cat}" at ${diff} difficulty for B.Tech students.\nReturn ONLY JSON array, no other text:\n[{"q":"question","o":["A","B","C","D"],"a":0},...]`}]})});
  let data=await resp.json();let raw=(data.content&&data.content[0]&&data.content[0].text)||'[]';let newQs=JSON.parse(raw.replace(/```json|```/g,'').trim());
  let qb=getQBank();if(!qb[cat])qb[cat]=[];newQs.forEach(q=>qb[cat].push({q:q.q,o:q.o,a:q.a}));localStorage.setItem('questionBank',JSON.stringify(qb));
  status.style.color='#86efac';status.innerText='✅ Added '+newQs.length+' questions to '+cat+'!';showNotif('✅ '+newQs.length+' questions added!');renderQTable();}
  catch(e){status.style.color='#fca5a5';status.innerText='❌ Error: '+e.message;}
  btn.disabled=false;btn.innerText='✨ Generate Questions';
}
function renderLeaderboard(){let board=JSON.parse(localStorage.getItem('leaderboard'))||[];board.sort((a,b)=>b.score-a.score);document.getElementById('secContent').innerHTML=`<div class="glass-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px"><div style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700">🏆 Assessment Results</div><div style="display:flex;gap:8px"><button class="btn btn-secondary btn-sm" onclick="exportAllCSV()">📊 CSV</button><button class="btn btn-danger btn-sm" onclick="clearLeaderboard()">🗑 Clear</button></div></div><div style="overflow-x:auto"><table><thead><tr><th>Rank</th><th>Name</th><th>Score</th><th>Attempted</th></tr></thead><tbody>${board.length?board.map((u,i)=>`<tr><td>${['🥇','🥈','🥉'][i]||'#'+(i+1)}</td><td><strong>${u.name}</strong></td><td style="font-weight:700;color:#f5c842">${u.score}/20</td><td style="color:var(--text2)">${u.attempted||u.score}/20</td></tr>`).join(''):'<tr><td colspan="4" style="text-align:center;color:var(--text2);padding:20px">No results yet</td></tr>'}</tbody></table></div></div>`;}
function renderBatches(){let batches=JSON.parse(localStorage.getItem('batches'))||[];document.getElementById('secContent').innerHTML=`<div class="glass-card" style="margin-bottom:14px"><div style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;margin-bottom:14px">➕ Create Batch</div><div class="grid2" style="margin-bottom:12px"><div class="form-group" style="margin:0"><label class="form-label">Batch Name</label><input class="form-input" id="bName" placeholder="e.g. IT 2024-2028"></div><div class="form-group" style="margin:0"><label class="form-label">Dept</label><select class="form-input" id="bDept"><option>IT</option><option>CSE</option><option>ECE</option><option>EEE</option><option>MECH</option></select></div><div class="form-group" style="margin:0"><label class="form-label">Year</label><select class="form-input" id="bYear"><option>2024-2028</option><option>2023-2027</option><option>2025-2029</option></select></div></div><button class="btn btn-primary" onclick="addBatch()">+ Create Batch</button></div><div class="glass-card"><div style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;margin-bottom:14px">🏫 Batches</div>${batches.length?batches.map((b,i)=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px"><div><div style="font-weight:600">${b.name}</div><div style="font-size:12px;color:var(--text2);margin-top:2px">${b.dept} · ${b.year} · ${new Date(b.created||Date.now()).toLocaleDateString('en-IN')}</div></div><button class="btn btn-danger btn-sm" onclick="delBatch(${i})">🗑</button></div>`).join(''):'<div style="text-align:center;color:var(--text2);font-size:13px;padding:16px">No batches yet</div>'}</div>`;}
function addBatch(){let n=document.getElementById('bName').value.trim();if(!n){alert('Name required!');return;}let batches=JSON.parse(localStorage.getItem('batches'))||[];batches.push({name:n,dept:document.getElementById('bDept').value,year:document.getElementById('bYear').value,created:Date.now()});localStorage.setItem('batches',JSON.stringify(batches));showNotif('✅ Batch created!');renderBatches();}
function delBatch(i){let b=JSON.parse(localStorage.getItem('batches'))||[];b.splice(i,1);localStorage.setItem('batches',JSON.stringify(b));showNotif('🗑 Deleted','error');renderBatches();}
function renderNotifications(){document.getElementById('secContent').innerHTML=`<div class="glass-card"><div style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;margin-bottom:14px">🔔 Send Announcement</div><div class="form-group"><label class="form-label">Message</label><textarea class="form-input" id="notifMsgMain" placeholder="Type announcement..." rows="4"></textarea></div><button class="btn btn-primary" onclick="sendNotifMain()">📤 Send to All Students</button><div id="notifSuccess" style="color:#86efac;font-size:13px;margin-top:10px;display:none">✅ Sent!</div></div>`;}
function sendNotif(){let msg=document.getElementById('notifMsg').value.trim();if(!msg)return;let notifs=JSON.parse(localStorage.getItem('userNotifs'))||[];notifs.unshift({msg,time:new Date().toLocaleTimeString(),read:false});notifs=notifs.slice(0,20);localStorage.setItem('userNotifs',JSON.stringify(notifs));document.getElementById('notifModal').style.display='none';showNotif('✅ Sent to all students!');}
function sendNotifMain(){let msg=document.getElementById('notifMsgMain').value.trim();if(!msg)return;let notifs=JSON.parse(localStorage.getItem('userNotifs'))||[];notifs.unshift({msg,time:new Date().toLocaleTimeString(),read:false});notifs=notifs.slice(0,20);localStorage.setItem('userNotifs',JSON.stringify(notifs));document.getElementById('notifSuccess').style.display='block';showNotif('✅ Sent!');}
function renderSettings(){let s=getSettings();document.getElementById('secContent').innerHTML=`<div class="glass-card"><div style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;margin-bottom:20px">⚙️ Admin Settings</div><div class="grid2"><div class="form-group"><label class="form-label">Assessment Duration (min)</label><input class="form-input" id="sTime" type="number" value="${s.assessTime||45}"></div><div class="form-group"><label class="form-label">Secure Code (6 digits)</label><input class="form-input" id="sCode" type="text" value="${s.secureCode||'123456'}" maxlength="6"></div><div class="form-group"><label class="form-label">Course Start Date</label><input class="form-input" id="sCStart" type="text" value="${s.courseStart||'25 Mar 2026'}"></div><div class="form-group"><label class="form-label">Course End Date</label><input class="form-input" id="sCEnd" type="text" value="${s.courseEnd||'05 Apr 2026'}"></div></div><div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px"><label style="display:flex;align-items:center;gap:10px;cursor:pointer"><input type="checkbox" id="sAnti" ${s.antiCheat!==false?'checked':''}><span style="font-size:13px">Enable Anti-cheat (tab switch detection)</span></label><label style="display:flex;align-items:center;gap:10px;cursor:pointer"><input type="checkbox" id="sFS" ${s.forceFullscreen!==false?'checked':''}><span style="font-size:13px">Force fullscreen during assessment</span></label><label style="display:flex;align-items:center;gap:10px;cursor:pointer"><input type="checkbox" id="sShuffle" ${s.shuffleQ!==false?'checked':''}><span style="font-size:13px">Shuffle questions (anti-copying)</span></label><label style="display:flex;align-items:center;gap:10px;cursor:pointer"><input type="checkbox" id="sCert" ${s.certDownload!==false?'checked':''}><span style="font-size:13px">Allow certificate download</span></label></div><button class="btn btn-primary" onclick="saveSettings()">💾 Save Settings</button><div id="settingsSaved" style="color:#86efac;font-size:13px;margin-top:10px;display:none">✅ Settings saved!</div></div>`;}
function saveSettings(){let s={assessTime:parseInt(document.getElementById('sTime').value)||45,secureCode:document.getElementById('sCode').value||'123456',courseStart:document.getElementById('sCStart').value,courseEnd:document.getElementById('sCEnd').value,antiCheat:document.getElementById('sAnti').checked,forceFullscreen:document.getElementById('sFS').checked,shuffleQ:document.getElementById('sShuffle').checked,certDownload:document.getElementById('sCert').checked};localStorage.setItem('adminSettings',JSON.stringify(s));document.getElementById('settingsSaved').style.display='block';setTimeout(()=>document.getElementById('settingsSaved').style.display='none',2500);showNotif('✅ Settings saved!');}
function exportAllCSV(){let board=JSON.parse(localStorage.getItem('leaderboard'))||[];if(!board.length){alert('No data');return;}board.sort((a,b)=>b.score-a.score);let csv='Rank,Name,Score,Attempted\n'+board.map((u,i)=>`${i+1},${u.name},${u.score}/20,${u.attempted||u.score}/20`).join('\n');let a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='APTIORA_Results_'+new Date().toLocaleDateString('en-IN').replace(/\//g,'-')+'.csv';a.click();}
function clearLeaderboard(){if(!confirm('Clear all leaderboard data?'))return;localStorage.removeItem('leaderboard');showNotif('🗑 Cleared','error');renderDashboard();}
</script>
</body>
</html>
