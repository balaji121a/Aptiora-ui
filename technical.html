<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Technical Quiz — APTIORA</title>
<link rel="stylesheet" href="aptiora.css">
<style>
.sub-btn{padding:9px 18px;border-radius:var(--radius);border:1px solid var(--border);background:rgba(255,255,255,0.05);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;}
.sub-btn.on{background:rgba(245,158,11,0.18);border-color:rgba(245,158,11,0.4);color:#fcd34d;}
.tech-opt{padding:12px 16px;border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:13px;margin-bottom:8px;transition:all 0.2s;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.02);}
.tech-opt:hover{border-color:rgba(245,158,11,0.4);background:rgba(245,158,11,0.05);}
.tech-opt.correct{border-color:rgba(34,197,94,0.5);background:rgba(34,197,94,0.1);color:#86efac;}
.tech-opt.wrong{border-color:rgba(239,68,68,0.5);background:rgba(239,68,68,0.08);color:#fca5a5;}
.q-card-t{background:rgba(13,13,20,0.9);border:1px solid var(--border);border-radius:var(--radius-xl);padding:22px;margin-bottom:14px;position:relative;overflow:hidden;}
.q-card-t::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(245,158,11,0.4),transparent);}
body.light .q-card-t{background:var(--surface);}
body.light .tech-opt{background:var(--stat-bg);border-color:var(--bdr2);color:var(--tx);}
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div>
<canvas class="bg-canvas" id="bgCanvas"></canvas>
<div id="sb"></div>
<div class="app-main" id="appMain">
  <div class="app-topbar">
    <div class="topbar-left"><button class="collapse-btn" id="collapseBtn">☰</button><div class="page-title">🔬 Technical Quiz</div></div>
    <div class="topbar-right"><button class="tb-btn" id="themeBtn">🌙</button></div>
  </div>
  <div class="app-page">
    <div class="glass-card anim-fadeUp" style="margin-bottom:16px;">
      <div style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;margin-bottom:10px;">📚 Select Subject</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;" id="subBtns"></div>
    </div>
    <div id="quizArea">
      <div class="glass-card" style="text-align:center;padding:40px;">
        <div style="font-size:48px;margin-bottom:12px">🔬</div>
        <div style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin-bottom:8px">Technical Quiz</div>
        <div style="font-size:13px;color:var(--text2)">Select a subject above to start. Questions are from the admin question bank.</div>
      </div>
    </div>
  </div>
</div>
<script src="aptiora.js"></script>
<script>
let user=getCurrentUser();if(!user)throw'';
let {reg,name}=user;
document.getElementById('sb').innerHTML=buildSidebar('technical',name,reg);
initSidebar();

// Default questions (always available)
let defaultQ={
  'DBMS':[{q:"What does DBMS stand for?",o:["Database Management System","Data Byte Management System","Digital Base Management System","Data Base Module System"],a:0,exp:"DBMS = Database Management System."},{q:"Which SQL command retrieves data?",o:["INSERT","UPDATE","SELECT","DELETE"],a:2,exp:"SELECT fetches data from a table."},{q:"Primary key must be:",o:["Can be NULL","Unique & NOT NULL","Can repeat","Optional"],a:1,exp:"Primary key uniquely identifies each row."},{q:"ACID stands for:",o:["Atomicity, Consistency, Isolation, Durability","Automation, Control, Integration, Data","Access, Create, Insert, Delete","None"],a:0,exp:"ACID ensures reliable transactions."},{q:"Which is NOT a JOIN type?",o:["INNER JOIN","OUTER JOIN","SQUARE JOIN","CROSS JOIN"],a:2,exp:"SQUARE JOIN doesn't exist."},{q:"Normalization means:",o:["Adding redundancy","Reducing redundancy","Deleting tables","Merging databases"],a:1,exp:"Normalization reduces data redundancy."},{q:"SQL stands for:",o:["Simple Query Language","Structured Query Language","Standard Query Language","System Query Language"],a:1,exp:"SQL = Structured Query Language."},{q:"DROP command does what?",o:["Deletes rows","Removes entire table","Updates rows","Creates table"],a:1,exp:"DROP TABLE removes the whole table structure."}],
  'OS':[{q:"OS stands for:",o:["Output System","Operating System","Optimal Software","None"],a:1,exp:"OS = Operating System."},{q:"SJF scheduling means:",o:["Shortest Job First","Sequential Job First","Simple Job First","Standard Job First"],a:0,exp:"SJF gives CPU to process with smallest burst time."},{q:"Virtual memory allows:",o:["Faster CPU","Programs larger than RAM to run","More storage","Better graphics"],a:1,exp:"Virtual memory uses disk as extended RAM."},{q:"Semaphore is used for:",o:["Memory management","Process synchronization","File management","CPU scheduling"],a:1,exp:"Semaphores control access to shared resources."},{q:"Page fault means:",o:["CPU is busy","Required page not in RAM","Disk is full","Memory overflow"],a:1,exp:"Page fault occurs when required page isn't in physical memory."},{q:"Deadlock requires which condition?",o:["Mutual Exclusion","Aging","Time Sharing","Swapping"],a:0,exp:"Deadlock requires: Mutual Exclusion, Hold & Wait, No Preemption, Circular Wait."},{q:"Thrashing means:",o:["High CPU use","Excessive paging, low CPU use","Memory leak","Disk crash"],a:1,exp:"Thrashing: processes spend more time paging than executing."},{q:"Critical section is:",o:["Fast code","Code accessing shared resources","Loop","Function"],a:1,exp:"Critical section accesses shared resources — needs mutual exclusion."}],
  'CN':[{q:"IPv4 address size:",o:["16 bits","32 bits","64 bits","128 bits"],a:1,exp:"IPv4 = 32 bits (4 octets)."},{q:"HTTP uses which port?",o:["21","25","80","443"],a:2,exp:"HTTP uses port 80. HTTPS uses 443."},{q:"OSI model layers:",o:["4","5","7","9"],a:2,exp:"OSI has 7 layers: Physical to Application."},{q:"DNS converts:",o:["IP to MAC","Domain name to IP","IP to domain","URL to email"],a:1,exp:"DNS translates domain names to IP addresses."},{q:"FTP is used for:",o:["Email","File transfer","Web browsing","Chat"],a:1,exp:"FTP = File Transfer Protocol."},{q:"TCP is:",o:["Connectionless","Connection-oriented","Wireless","None"],a:1,exp:"TCP ensures reliable, ordered delivery."},{q:"Bandwidth means:",o:["Speed of light","Data transfer rate","Memory size","CPU speed"],a:1,exp:"Bandwidth = maximum data transfer rate."},{q:"UDP vs TCP — UDP is:",o:["Slower","Reliable","Faster, no guarantee","Same speed"],a:2,exp:"UDP is faster but doesn't guarantee delivery."}],
  'DSA':[{q:"Stack uses which principle?",o:["FIFO","LIFO","Random","Priority"],a:1,exp:"Stack = LIFO (Last In First Out)."},{q:"Queue uses which principle?",o:["LIFO","FIFO","Random","None"],a:1,exp:"Queue = FIFO (First In First Out)."},{q:"Binary search requires:",o:["Unsorted array","Sorted array","Circular array","Linked list"],a:1,exp:"Binary search only works on sorted arrays."},{q:"Binary search time complexity:",o:["O(n)","O(n²)","O(log n)","O(1)"],a:2,exp:"Binary search = O(log n)."},{q:"Linked list advantage:",o:["Faster access","Dynamic size","Less memory","Always sorted"],a:1,exp:"Linked lists can grow/shrink dynamically."},{q:"Height of balanced BST with n nodes:",o:["O(n)","O(log n)","O(n²)","O(1)"],a:1,exp:"Balanced BST height = O(log n)."},{q:"Preorder traversal visits:",o:["Left, Root, Right","Root, Left, Right","Left, Right, Root","Right, Root, Left"],a:1,exp:"Preorder = Root → Left → Right."},{q:"Which data structure for BFS?",o:["Stack","Queue","Tree","Array"],a:1,exp:"BFS uses a Queue to visit nodes level by level."}]
};

let subjects=['DBMS','OS','CN','DSA'];
let curSub=null,curQidx=0,techAns={};

document.getElementById('subBtns').innerHTML=subjects.map(s=>`<button class="sub-btn" onclick="selectSub('${s}',this)">${s}</button>`).join('');

function getSubjectQ(sub){
  // Merge default + admin custom questions
  let custom=JSON.parse(localStorage.getItem('techQBank'))||{};
  let base=defaultQ[sub]||[];
  let extra=(custom[sub]||[]).map(q=>({q:q.q,o:q.o,a:q.a,exp:q.exp||'Review this concept.'}));
  return [...base,...extra];
}

function selectSub(sub,el){
  curSub=sub;curQidx=0;techAns={};
  document.querySelectorAll('.sub-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  renderTQ();
}

function renderTQ(){
  let qs=getSubjectQ(curSub),q=qs[curQidx],total=qs.length;
  let score=Object.keys(techAns).filter(k=>techAns[k]===qs[parseInt(k)].a).length;
  document.getElementById('quizArea').innerHTML=`
  <div class="q-card-t anim-fadeUp">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
      <div style="display:flex;align-items:center;gap:8px"><span class="badge badge-gold">${curSub}</span><span style="font-size:12px;color:var(--text2)">Q${curQidx+1}/${total}</span></div>
      <div style="font-size:12px;color:var(--text2)">✅ ${score} correct</div>
    </div>
    <div class="prog-bar" style="margin-bottom:16px"><div class="prog-fill prog-gold" style="width:${Math.round((curQidx/total)*100)}%"></div></div>
    <div style="font-size:16px;font-weight:600;line-height:1.55;margin-bottom:18px">${q.q}</div>
    ${q.o.map((o,i)=>`<div class="tech-opt${techAns[curQidx]!==undefined?(i===q.a?' correct':(i===techAns[curQidx]&&techAns[curQidx]!==q.a?' wrong':'')):''}\" onclick="ansTQ(${i})"><div style="width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">${['A','B','C','D'][i]}</div>${o}</div>`).join('')}
    ${techAns[curQidx]!==undefined?`<div style="background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.2);border-radius:var(--radius);padding:9px 13px;margin-top:10px;font-size:12px;color:#fcd34d">💡 ${q.exp||'Review this concept.'}</div>`:''}
    <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;">
      ${curQidx>0?`<button class="btn btn-secondary btn-sm" onclick="tqPrev()">◀ Prev</button>`:''}
      ${curQidx<total-1?`<button class="btn btn-primary btn-sm" onclick="tqNext()">Next ▶</button>`:`<button class="btn btn-success btn-sm" onclick="tqResult()">🏁 Finish</button>`}
    </div>
  </div>`;
}

function ansTQ(i){
  let qs=getSubjectQ(curSub);
  if(techAns[curQidx]!==undefined)return;
  techAns[curQidx]=i;
  if(i===qs[curQidx].a)sndCorrect();else sndWrong();
  renderTQ();
}
function tqNext(){let qs=getSubjectQ(curSub);if(curQidx<qs.length-1){curQidx++;renderTQ();}}
function tqPrev(){if(curQidx>0){curQidx--;renderTQ();}}
function tqResult(){
  let qs=getSubjectQ(curSub);
  let score=Object.keys(techAns).filter(k=>techAns[k]===qs[parseInt(k)].a).length;
  let total=qs.length,pct=Math.round(score/total*100);
  let prog=parseInt(localStorage.getItem('techProg_'+reg))||0;
  localStorage.setItem('techProg_'+reg,Math.min(100,prog+25));
  saveScoreHistory(reg,'Technical-'+curSub,score,total);
  document.getElementById('quizArea').innerHTML=`
  <div class="glass-card anim-scaleIn" style="text-align:center;padding:36px">
    <div style="font-size:52px;margin-bottom:14px">${pct>=80?'🌟':pct>=60?'👏':'📚'}</div>
    <div style="font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;margin-bottom:6px">${curSub} Result</div>
    <div style="font-size:28px;font-weight:800;color:${pct>=60?'#86efac':'#fca5a5'};margin:14px 0">${score}/${total} (${pct}%)</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:20px">${pct>=80?'Excellent! Strong grasp of '+curSub:pct>=60?'Good! Review incorrect answers.':'Keep practicing — focus on core concepts.'}</div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="selectSub('${curSub}',document.querySelector('.sub-btn.on'))">🔄 Try Again</button>
      <button class="btn btn-secondary" onclick="location.href='dashboard.html'">🏠 Dashboard</button>
    </div>
  </div>`;
}
</script>

<!-- ══ THREE.JS 3D BACKGROUND ══ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  // Remove old 2D canvas if present
  var old=document.getElementById('bgCanvas');
  if(old)old.style.display='none';

  var c=document.createElement('canvas');
  c.id='threeCanvas3D';
  c.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;';
  document.body.insertBefore(c,document.body.firstChild);

  var renderer=new THREE.WebGLRenderer({canvas:c,antialias:true,alpha:false});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setClearColor(0x04000e,1);

  var scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x04000e,0.007);

  var camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,2000);
  camera.position.set(0,0,80);

  scene.add(new THREE.AmbientLight(0x7c3aed,0.4));
  var dl=new THREE.DirectionalLight(0xffffff,0.6);
  dl.position.set(1,1,1);scene.add(dl);

  var pl1=new THREE.PointLight(0x7c3aed,2.5,140);
  pl1.position.set(0,0,30);scene.add(pl1);
  var pl2=new THREE.PointLight(0xd4af37,1.8,120);
  pl2.position.set(30,-20,10);scene.add(pl2);
  var pl3=new THREE.PointLight(0x3b82f6,1.2,100);
  pl3.position.set(-30,20,0);scene.add(pl3);

  var geos=[
    new THREE.IcosahedronGeometry(5,0),
    new THREE.OctahedronGeometry(4,0),
    new THREE.TetrahedronGeometry(4,0),
    new THREE.IcosahedronGeometry(3,0),
    new THREE.OctahedronGeometry(6,0),
    new THREE.TetrahedronGeometry(5,0)
  ];
  var cols=[0x7c3aed,0x5b21b6,0xd4af37,0xc4b5fd,0x6d28d9,0xf97316,0x3b82f6,0xa78bfa];
  var shapes=[];
  for(var i=0;i<20;i++){
    var mat=new THREE.MeshStandardMaterial({
      color:cols[i%cols.length],wireframe:i%3!==0,
      metalness:0.75,roughness:0.2,transparent:true,opacity:0.4+Math.random()*0.4
    });
    var m=new THREE.Mesh(geos[i%geos.length],mat);
    m.position.set((Math.random()-0.5)*200,(Math.random()-0.5)*110,(Math.random()-0.5)*90-20);
    var s=0.4+Math.random()*0.9;m.scale.set(s,s,s);
    m.userData={rx:(Math.random()-0.5)*0.009,ry:(Math.random()-0.5)*0.013,rz:(Math.random()-0.5)*0.007,
      fs:0.3+Math.random()*0.7,fa:1.5+Math.random()*2,fo:Math.random()*Math.PI*2};
    scene.add(m);shapes.push(m);
  }

  var pN=3000,pp=new Float32Array(pN*3),pc=new Float32Array(pN*3);
  var pC=[new THREE.Color(0x7c3aed),new THREE.Color(0xd4af37),new THREE.Color(0xc4b5fd),
          new THREE.Color(0xffffff),new THREE.Color(0x3b82f6)];
  for(var i=0;i<pN;i++){
    pp[i*3]=(Math.random()-0.5)*450;pp[i*3+1]=(Math.random()-0.5)*280;pp[i*3+2]=(Math.random()-0.5)*220-40;
    var cl=pC[Math.floor(Math.random()*pC.length)];
    pc[i*3]=cl.r;pc[i*3+1]=cl.g;pc[i*3+2]=cl.b;
  }
  var pg=new THREE.BufferGeometry();
  pg.setAttribute('position',new THREE.BufferAttribute(pp,3));
  pg.setAttribute('color',new THREE.BufferAttribute(pc,3));
  var pts=new THREE.Points(pg,new THREE.PointsMaterial({size:0.55,vertexColors:true,transparent:true,opacity:0.72,sizeAttenuation:true}));
  scene.add(pts);

  var grid=new THREE.GridHelper(320,42,0x7c3aed,0x3b0764);
  grid.position.y=-46;grid.material.transparent=true;grid.material.opacity=0.2;
  scene.add(grid);

  var r1=new THREE.Mesh(new THREE.TorusGeometry(24,0.4,8,90),
    new THREE.MeshStandardMaterial({color:0x7c3aed,metalness:0.95,roughness:0.05,transparent:true,opacity:0.5}));
  r1.rotation.x=Math.PI/2.5;r1.position.z=-10;scene.add(r1);

  var r2=new THREE.Mesh(new THREE.TorusGeometry(38,0.3,8,90),
    new THREE.MeshStandardMaterial({color:0xd4af37,metalness:0.95,roughness:0.05,transparent:true,opacity:0.3}));
  r2.rotation.x=Math.PI/2.2;r2.rotation.y=0.4;r2.position.z=-18;scene.add(r2);

  var r3=new THREE.Mesh(new THREE.TorusGeometry(50,0.2,8,90),
    new THREE.MeshStandardMaterial({color:0x3b82f6,metalness:0.95,roughness:0.05,transparent:true,opacity:0.2}));
  r3.rotation.x=Math.PI/2.8;r3.rotation.z=0.5;r3.position.z=-25;scene.add(r3);

  var mx=0,my=0;
  document.addEventListener('mousemove',function(e){
    mx=(e.clientX/window.innerWidth-0.5)*2;my=(e.clientY/window.innerHeight-0.5)*2;
  });
  window.addEventListener('resize',function(){
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
  });

  var t=0;
  function animate(){
    requestAnimationFrame(animate);t+=0.006;
    camera.position.x+=(mx*9-camera.position.x)*0.04;
    camera.position.y+=(-my*6-camera.position.y)*0.04;
    camera.lookAt(0,0,0);
    shapes.forEach(function(m){
      m.rotation.x+=m.userData.rx;m.rotation.y+=m.userData.ry;m.rotation.z+=m.userData.rz;
      m.position.y+=Math.sin(t*m.userData.fs+m.userData.fo)*0.018*m.userData.fa;
    });
    r1.rotation.z+=0.004;r2.rotation.z-=0.003;r3.rotation.z+=0.002;
    pts.rotation.y+=0.0004;pts.rotation.x+=0.0002;
    grid.position.y=-46+Math.sin(t*0.5)*1.5;
    pl1.intensity=1.8+Math.sin(t*1.5)*1.0;
    pl1.position.x=Math.sin(t*0.5)*22;pl1.position.y=Math.cos(t*0.4)*15;
    pl2.position.x=Math.cos(t*0.4)*25;pl2.position.y=Math.sin(t*0.6)*15;
    renderer.render(scene,camera);
  }
  animate();
})();
</script>

</body>
</html>
