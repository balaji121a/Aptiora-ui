<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Coding Practice — APTIORA</title>
<link rel="stylesheet" href="aptiora.css">
<style>
.prob-card{background:rgba(13,13,20,0.88);border:1px solid rgba(59,130,246,0.2);border-radius:var(--radius-xl);padding:22px;margin-bottom:14px;cursor:pointer;transition:all 0.22s;}
.prob-card:hover{border-color:rgba(59,130,246,0.4);transform:translateY(-2px);}
.prob-card.active{border-color:rgba(59,130,246,0.6);background:rgba(59,130,246,0.06);}
.diff-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;}
.diff-easy{background:rgba(16,185,129,0.15);color:#6ee7b7;}.diff-med{background:rgba(245,158,11,0.15);color:#fcd34d;}.diff-hard{background:rgba(239,68,68,0.15);color:#fca5a5;}
.code-area{background:#0d0d14;border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;font-family:'Courier New',monospace;font-size:14px;color:#e2e8f0;resize:vertical;min-height:200px;outline:none;width:100%;line-height:1.7;tab-size:4;}
.code-area:focus{border-color:rgba(59,130,246,0.5);}
.output-box{background:#0d0d14;border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;font-family:'Courier New',monospace;font-size:13px;min-height:80px;white-space:pre-wrap;color:#86efac;margin-top:12px;}
.output-box.err{color:#fca5a5;}
.output-box.ai-review{color:rgba(255,255,255,0.85);font-family:'Inter',sans-serif;font-size:13px;line-height:1.7;}
.lang-btn{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:var(--text2);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;}
.lang-btn.on{background:rgba(59,130,246,0.2);border-color:rgba(59,130,246,0.4);color:#93c5fd;}
.test-case{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:8px;font-size:13px;}
.tc-pass{border-color:rgba(34,197,94,0.4);background:rgba(34,197,94,0.06);}
.tc-fail{border-color:rgba(239,68,68,0.4);background:rgba(239,68,68,0.06);}
body.light .code-area,.body.light .output-box{background:#1e1e2e!important;}
body.light .prob-card{background:var(--surface);}
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div>
<canvas class="bg-canvas" id="bgCanvas"></canvas>
<div id="sb"></div>
<div class="app-main" id="appMain">
  <div class="app-topbar">
    <div class="topbar-left"><button class="collapse-btn" id="collapseBtn">☰</button><div class="page-title">💻 Coding Practice</div></div>
    <div class="topbar-right"><button class="tb-btn" id="themeBtn">🌙</button></div>
  </div>
  <div class="app-page">
    <div class="grid2" style="align-items:start;gap:16px;">
      <!-- Left: Problem list -->
      <div>
        <div style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;margin-bottom:10px;">📋 Problems</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">
          <button class="lang-btn on" onclick="filterProbs('all',this)">All</button>
          <button class="lang-btn" onclick="filterProbs('Easy',this)">Easy</button>
          <button class="lang-btn" onclick="filterProbs('Medium',this)">Medium</button>
          <button class="lang-btn" onclick="filterProbs('Hard',this)">Hard</button>
        </div>
        <div id="probList"></div>
      </div>
      <!-- Right: Editor -->
      <div>
        <div class="glass-card anim-fadeUp" style="margin-bottom:14px;" id="probDesc">
          <div style="font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;margin-bottom:8px;" id="probTitle">Select a problem</div>
          <div style="font-size:13px;color:var(--text2);line-height:1.65;" id="probBody">Choose a problem from the left to start coding.</div>
          <div id="testCases" style="margin-top:12px;display:none;">
            <div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;">Test Cases</div>
            <div id="tcList"></div>
          </div>
        </div>
        <div class="glass-card anim-fadeUp" style="animation-delay:0.05s">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
            <div style="display:flex;gap:6px;">
              <button class="lang-btn on" id="pyBtn" onclick="setLang('python',this)">🐍 Python</button>
              <button class="lang-btn" id="cBtn" onclick="setLang('c',this)">© C</button>
              <button class="lang-btn" id="jBtn" onclick="setLang('java',this)">☕ Java</button>
            </div>
            <div style="display:flex;gap:7px;">
              <button class="btn btn-secondary btn-sm" onclick="clearCode()">🗑 Clear</button>
              <button class="btn btn-primary btn-sm" onclick="runCode()" id="runBtn">▶ Run & Review</button>
            </div>
          </div>
          <textarea class="code-area" id="codeEditor" placeholder="# Write your solution here...
# Click 'Run & Review' for AI feedback!"></textarea>
          <div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin:10px 0 6px;">Output / AI Review</div>
          <div class="output-box" id="outputBox">Click "Run & Review" to get AI feedback on your solution...</div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="aptiora.js"></script>
<script>
let user=getCurrentUser();if(!user)throw'';
let {reg,name}=user;
document.getElementById('sb').innerHTML=buildSidebar('coding',name,reg);
initSidebar();
let problems=[
  {id:1,title:'Sum of Two Numbers',diff:'Easy',desc:'Write a function that takes two numbers as input and returns their sum.',examples:[{in:'a=3, b=5',out:'8'},{in:'a=10, b=-3',out:'7'}],tc:[{i:'3,5',o:'8'},{i:'10,-3',o:'7'},{i:'0,0',o:'0'}],templates:{python:'def sum_two(a, b):\n    # Write your solution\n    pass\n\nprint(sum_two(3, 5))',c:'#include<stdio.h>\nint sum_two(int a, int b) {\n    // Write your solution\n}\nint main() {\n    printf("%d\\n", sum_two(3, 5));\n}',java:'public class Solution {\n    public static int sumTwo(int a, int b) {\n        // Write your solution\n        return 0;\n    }\n    public static void main(String[] args) {\n        System.out.println(sumTwo(3, 5));\n    }\n}'}},
  {id:2,title:'Check Prime Number',diff:'Easy',desc:'Write a function that checks if a given number is prime. Return True/1 if prime, False/0 otherwise.',examples:[{in:'n=7',out:'True'},{in:'n=10',out:'False'}],tc:[{i:'7',o:'True'},{i:'2',o:'True'},{i:'1',o:'False'},{i:'15',o:'False'}],templates:{python:'def is_prime(n):\n    # Write your solution\n    pass\n\nprint(is_prime(7))',c:'#include<stdio.h>\nint is_prime(int n) {\n    // Write your solution\n    return 0;\n}\nint main() {\n    printf("%d\\n", is_prime(7));\n}',java:'public class Solution {\n    public static boolean isPrime(int n) {\n        // Write your solution\n        return false;\n    }\n    public static void main(String[] args) {\n        System.out.println(isPrime(7));\n    }\n}'}},
  {id:3,title:'Fibonacci Sequence',diff:'Medium',desc:'Write a function to return the nth Fibonacci number. F(0)=0, F(1)=1, F(n)=F(n-1)+F(n-2).',examples:[{in:'n=6',out:'8'},{in:'n=10',out:'55'}],tc:[{i:'0',o:'0'},{i:'1',o:'1'},{i:'6',o:'8'},{i:'10',o:'55'}],templates:{python:'def fibonacci(n):\n    # Write your solution\n    pass\n\nprint(fibonacci(6))',c:'#include<stdio.h>\nint fibonacci(int n) {\n    // Write your solution\n    return 0;\n}\nint main() {\n    printf("%d\\n", fibonacci(6));\n}',java:'public class Solution {\n    public static int fibonacci(int n) {\n        // Write your solution\n        return 0;\n    }\n    public static void main(String[] args) {\n        System.out.println(fibonacci(6));\n    }\n}'}},
  {id:4,title:'Reverse a String',diff:'Easy',desc:'Write a function that reverses a given string.',examples:[{in:'"hello"',out:'"olleh"'},{in:'"APTIORA"',out:'"AROTIIPA"'}],tc:[{i:'"hello"',o:'"olleh"'},{i:'"abc"',o:'"cba"'},{i:'"a"',o:'"a"'}],templates:{python:'def reverse_string(s):\n    # Write your solution\n    pass\n\nprint(reverse_string("hello"))',c:'#include<stdio.h>\n#include<string.h>\nvoid reverse_string(char* s) {\n    // Write your solution\n}\nint main() {\n    char s[] = "hello";\n    reverse_string(s);\n    printf("%s\\n", s);\n}',java:'public class Solution {\n    public static String reverseString(String s) {\n        // Write your solution\n        return "";\n    }\n    public static void main(String[] args) {\n        System.out.println(reverseString("hello"));\n    }\n}'}},
  {id:5,title:'Find Maximum',diff:'Easy',desc:'Write a function that finds the maximum number in an array.',examples:[{in:'[1,5,3,9,2]',out:'9'}],tc:[{i:'[1,5,3,9,2]',o:'9'},{i:'[-1,-5,-3]',o:'-1'},{i:'[42]',o:'42'}],templates:{python:'def find_max(arr):\n    # Write your solution\n    pass\n\nprint(find_max([1, 5, 3, 9, 2]))',c:'#include<stdio.h>\nint find_max(int arr[], int n) {\n    // Write your solution\n    return 0;\n}\nint main() {\n    int arr[] = {1,5,3,9,2};\n    printf("%d\\n", find_max(arr, 5));\n}',java:'public class Solution {\n    public static int findMax(int[] arr) {\n        // Write your solution\n        return 0;\n    }\n    public static void main(String[] args) {\n        int[] arr = {1,5,3,9,2};\n        System.out.println(findMax(arr));\n    }\n}'}},
  {id:6,title:'Bubble Sort',diff:'Medium',desc:'Implement bubble sort to sort an array in ascending order.',examples:[{in:'[64,34,25,12,22]',out:'[12,22,25,34,64]'}],tc:[{i:'[64,34,25,12,22]',o:'[12,22,25,34,64]'},{i:'[1]',o:'[1]'},{i:'[3,1,2]',o:'[1,2,3]'}],templates:{python:'def bubble_sort(arr):\n    # Write your solution\n    pass\n\nprint(bubble_sort([64, 34, 25, 12, 22]))',c:'#include<stdio.h>\nvoid bubble_sort(int arr[], int n) {\n    // Write your solution\n}\nint main() {\n    int arr[] = {64,34,25,12,22};\n    bubble_sort(arr, 5);\n    for(int i=0;i<5;i++) printf("%d ", arr[i]);\n}',java:'import java.util.Arrays;\npublic class Solution {\n    public static void bubbleSort(int[] arr) {\n        // Write your solution\n    }\n    public static void main(String[] args) {\n        int[] arr = {64,34,25,12,22};\n        bubbleSort(arr);\n        System.out.println(Arrays.toString(arr));\n    }\n}'}},
  {id:7,title:'Count Vowels',diff:'Easy',desc:'Count the number of vowels (a,e,i,o,u) in a string.',examples:[{in:'"Hello World"',out:'3'}],tc:[{i:'"hello"',o:'2'},{i:'"aeiou"',o:'5'},{i:'"xyz"',o:'0'}],templates:{python:'def count_vowels(s):\n    # Write your solution\n    pass\n\nprint(count_vowels("Hello World"))',c:'#include<stdio.h>\nint count_vowels(char* s) {\n    // Write your solution\n    return 0;\n}\nint main() {\n    printf("%d\\n", count_vowels("Hello World"));\n}',java:'public class Solution {\n    public static int countVowels(String s) {\n        // Write your solution\n        return 0;\n    }\n    public static void main(String[] args) {\n        System.out.println(countVowels("Hello World"));\n    }\n}'}},
  {id:8,title:'Binary Search',diff:'Hard',desc:'Implement binary search to find the index of a target in a sorted array. Return -1 if not found.',examples:[{in:'arr=[1,3,5,7,9], target=5',out:'2'}],tc:[{i:'[1,3,5,7,9], 5',o:'2'},{i:'[1,3,5,7,9], 1',o:'0'},{i:'[1,3,5,7,9], 6',o:'-1'}],templates:{python:'def binary_search(arr, target):\n    # Write your solution\n    pass\n\nprint(binary_search([1,3,5,7,9], 5))',c:'#include<stdio.h>\nint binary_search(int arr[], int n, int target) {\n    // Write your solution\n    return -1;\n}\nint main() {\n    int arr[] = {1,3,5,7,9};\n    printf("%d\\n", binary_search(arr, 5, 5));\n}',java:'public class Solution {\n    public static int binarySearch(int[] arr, int target) {\n        // Write your solution\n        return -1;\n    }\n    public static void main(String[] args) {\n        int[] arr = {1,3,5,7,9};\n        System.out.println(binarySearch(arr, 5));\n    }\n}'}}
];
let customProbs=JSON.parse(localStorage.getItem('customCodingProblems'))||[];let allProblems=[...problems,...customProbs];problems=allProblems;let curLang='python',curProb=null,filterDiff='all';
function filterProbs(d,el){filterDiff=d;document.querySelectorAll('.lang-btn').forEach(b=>{if(['all','Easy','Medium','Hard'].some(x=>b.onclick&&b.onclick.toString().includes(x)))b.classList.remove('on');});el.classList.add('on');renderProbs();}
function renderProbs(){
  let list=filterDiff==='all'?problems:problems.filter(p=>p.diff===filterDiff);
  document.getElementById('probList').innerHTML=list.map(p=>`<div class="prob-card${curProb&&curProb.id===p.id?' active':''}" onclick="selectProb(${p.id})"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;"><div style="font-size:13px;font-weight:600">${p.title}</div><span class="diff-badge diff-${p.diff==='Easy'?'easy':p.diff==='Medium'?'med':'hard'}">${p.diff}</span></div><div style="font-size:11px;color:var(--text2)">${p.desc.slice(0,60)}...</div></div>`).join('');
}
function selectProb(id){
  curProb=problems.find(p=>p.id===id);if(!curProb)return;
  document.getElementById('probTitle').innerText=curProb.title;
  document.getElementById('probBody').innerHTML=`<p style="margin-bottom:8px">${curProb.desc}</p><div style="margin-top:8px">${curProb.examples.map(e=>`<div style="background:rgba(255,255,255,0.04);border-radius:8px;padding:7px 10px;margin-bottom:5px;font-family:'Courier New',monospace;font-size:12px"><span style="color:#a78bfa">Input:</span> ${e.in} → <span style="color:#86efac">Output:</span> ${e.out}</div>`).join('')}</div>`;
  document.getElementById('testCases').style.display='block';
  document.getElementById('tcList').innerHTML=curProb.tc.map((tc,i)=>`<div class="test-case" id="tc${i}"><span style="color:var(--text2);font-size:11px">Test ${i+1}:</span> Input: <code>${tc.i}</code> → Expected: <code>${tc.o}</code></div>`).join('');
  document.getElementById('codeEditor').value=curProb.templates[curLang]||'# Write your solution here';
  document.getElementById('outputBox').className='output-box';document.getElementById('outputBox').innerText='Click "Run & Review" to get AI feedback on your solution...';
  renderProbs();
}
function setLang(lang,el){curLang=lang;document.querySelectorAll('#pyBtn,#cBtn,#jBtn').forEach(b=>b.classList.remove('on'));el.classList.add('on');if(curProb)document.getElementById('codeEditor').value=curProb.templates[lang]||'// Write your solution';}
function clearCode(){document.getElementById('codeEditor').value=curProb?curProb.templates[curLang]||'':'';}
async function runCode(){
  if(!curProb){alert('Select a problem first!');return;}
  let code=document.getElementById('codeEditor').value.trim();if(!code){alert('Write some code first!');return;}
  let btn=document.getElementById('runBtn');btn.disabled=true;btn.innerText='Reviewing...';
  let out=document.getElementById('outputBox');out.className='output-box ai-review';out.innerText='🤖 AI reviewing your code...';
  try{
    let resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:350,messages:[{role:'user',content:`Review this ${curLang} solution for the problem "${curProb.title}":\n\nProblem: ${curProb.desc}\n\nStudent's code:\n${code}\n\nProvide:\n1. Is it correct? (Yes/No + brief reason)\n2. Time complexity\n3. One specific improvement tip\n4. Example: what would the output be for the first test case?\n\nBe concise and helpful. Format clearly.`}]})});
    let data=await resp.json();let review=(data.content&&data.content[0]&&data.content[0].text)||'Good attempt! Review your logic.';
    out.innerText=review;
    let prog=parseInt(localStorage.getItem('codingProg_'+reg))||0;localStorage.setItem('codingProg_'+reg,Math.min(100,prog+Math.floor(100/problems.length)));
    awardBadge(reg,'coding_done');
  }catch(e){out.className='output-box err';out.innerHTML='<strong>⚠️ AI Review Note:</strong><br><br>The AI code reviewer requires Claude API access. When running on a local server or hosting platform, AI features will work automatically.<br><br><strong>Your code is saved.</strong> Try submitting your solution to see if the logic is correct!';} 
  btn.disabled=false;btn.innerText='▶ Run & Review';
}
renderProbs();
</script>
</body>
</html>
