<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Profile — APTIORA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#f5c842;--purple:#7c3aed;--dark:#050508;--dark3:#13131f;--text:#ffffff;--text2:rgba(255,255,255,0.55);--border:rgba(255,255,255,0.08);}
html,body{width:100%;min-height:100%;font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);overflow-x:hidden;}
body::before{content:"";position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.4;}
canvas{position:fixed;inset:0;z-index:1;pointer-events:none;}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:1;}
.orb1{width:400px;height:400px;background:radial-gradient(circle,rgba(124,58,237,0.18),transparent 70%);top:-100px;left:-100px;animation:f1 12s ease-in-out infinite;}
.orb2{width:300px;height:300px;background:radial-gradient(circle,rgba(245,200,66,0.06),transparent 70%);bottom:-60px;right:-60px;animation:f2 10s ease-in-out infinite;}
@keyframes f1{0%,100%{transform:translate(0,0);}50%{transform:translate(30px,30px);}}
@keyframes f2{0%,100%{transform:translate(0,0);}50%{transform:translate(-20px,-20px);}}
.navbar{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;background:rgba(5,5,8,0.7);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:800;letter-spacing:3px;background:linear-gradient(135deg,#fff 30%,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.back-btn{background:rgba(255,255,255,0.07);border:1px solid var(--border);color:white;padding:8px 16px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;transition:all 0.2s;}
.back-btn:hover{background:rgba(255,255,255,0.12);}
.page{position:relative;z-index:10;padding:100px 24px 60px;max-width:600px;margin:0 auto;}
.profile-card{background:rgba(13,13,20,0.85);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.1);border-radius:28px;padding:40px 36px;box-shadow:0 20px 60px rgba(0,0,0,0.5);animation:fadeIn 0.7s ease;position:relative;overflow:hidden;margin-bottom:20px;}
.profile-card::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(124,58,237,0.5),transparent);}
@keyframes fadeIn{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
.avatar-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:28px;}
.avatar-circle{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--purple),#6d28d9);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:white;margin-bottom:12px;box-shadow:0 8px 28px rgba(124,58,237,0.4);}
.profile-name{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;margin-bottom:4px;}
.profile-reg-badge{background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.3);color:#a78bfa;padding:5px 16px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:0.5px;}
.divider{height:1px;background:var(--border);margin:20px 0;}
.info-grid{display:flex;flex-direction:column;gap:10px;}
.info-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;}
.info-label{font-size:12px;color:var(--text2);font-weight:500;}
.info-val{font-size:14px;font-weight:600;color:white;}
.prog-section{margin-top:20px;}
.prog-title{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.prog-item{margin-bottom:12px;}
.prog-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;}
.prog-bar{height:6px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--purple),#a78bfa);border-radius:4px;transition:width 1s ease;}
.logout-btn{width:100%;padding:13px;border:none;border-radius:12px;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);color:#fca5a5;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;margin-top:20px;}
.logout-btn:hover{background:rgba(239,68,68,0.2);}
/* SCORE HISTORY CARD */
.hist-card{background:rgba(13,13,20,0.85);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.1);border-radius:28px;padding:28px 36px;box-shadow:0 20px 60px rgba(0,0,0,0.5);animation:fadeIn 0.7s ease 0.15s both;position:relative;overflow:hidden;margin-bottom:20px;}
.hist-card::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,0.5),transparent);}
.hist-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.hist-sub{font-size:12px;color:var(--text2);margin-bottom:18px;}
.chart-wrap{display:flex;align-items:flex-end;gap:8px;height:70px;margin-bottom:8px;}
.chart-bar{flex:1;border-radius:4px 4px 0 0;display:flex;align-items:flex-end;justify-content:center;padding-bottom:3px;font-size:10px;color:white;font-weight:700;min-height:6px;transition:height 0.6s ease;cursor:pointer;position:relative;}
.chart-bar:hover::after{content:attr(data-tip);position:absolute;bottom:110%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);color:white;font-size:10px;padding:4px 8px;border-radius:6px;white-space:nowrap;pointer-events:none;}
.chart-labels{display:flex;gap:8px;font-size:10px;color:var(--text2);}
.chart-lbl{flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.no-hist{font-size:13px;color:var(--text2);text-align:center;padding:20px;opacity:0.6;}
.topic-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.tf-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:var(--text2);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;}
.tf-btn.on{background:rgba(124,58,237,0.2);border-color:rgba(124,58,237,0.4);color:#a78bfa;}
/* LIGHT MODE */
body.light-mode{background:#f0f2f7!important;color:#1a1a2e!important;}
body.light-mode .navbar{background:rgba(240,242,247,0.85)!important;border-bottom-color:rgba(0,0,0,0.08)!important;}
body.light-mode .nav-logo{background:linear-gradient(135deg,#1a1a2e 30%,#7c3aed)!important;-webkit-background-clip:text!important;-webkit-text-fill-color:transparent!important;}
body.light-mode .back-btn{background:rgba(0,0,0,0.05)!important;border-color:rgba(0,0,0,0.1)!important;color:#1a1a2e!important;}
body.light-mode .profile-card,.light-mode .hist-card{background:rgba(255,255,255,0.92)!important;border-color:rgba(0,0,0,0.1)!important;}
body.light-mode .profile-name,.light-mode .hist-title{color:#1a1a2e!important;}
body.light-mode .info-row{background:rgba(0,0,0,0.03)!important;border-color:rgba(0,0,0,0.08)!important;}
body.light-mode .info-label{color:rgba(26,26,46,0.55)!important;}
body.light-mode .info-val{color:#1a1a2e!important;}
body.light-mode .prog-bar{background:rgba(0,0,0,0.08)!important;}
body.light-mode .divider{background:rgba(0,0,0,0.08)!important;}
body.light-mode canvas{opacity:0.2!important;}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<canvas id="c"></canvas>
<nav class="navbar">
  <div class="nav-logo">APTIORA</div>
  <button class="back-btn" onclick="location.href='dashboard.html'">⬅ Dashboard</button>
</nav>
<div class="page">
  <!-- PROFILE CARD -->
  <div class="profile-card">
    <div class="avatar-wrap">
      <div class="avatar-circle" id="avatar"></div>
      <div class="profile-name" id="profileName"></div>
      <div class="profile-reg-badge" id="profileReg"></div>
    </div>
    <div class="info-grid">
      <div class="info-row"><div class="info-label">🏫 Department</div><div class="info-val" id="dept">IT</div></div>
      <div class="info-row"><div class="info-label">📅 Batch</div><div class="info-val" id="batch">2024 – 2028</div></div>
      <div class="info-row"><div class="info-label">🎓 Program</div><div class="info-val">B.Tech</div></div>
      <div class="info-row"><div class="info-label">📝 Assessment</div><div class="info-val" id="assessStatus">Not Attempted</div></div>
    </div>
    <div class="divider"></div>
    <div class="prog-section">
      <div class="prog-title">Course Progress</div>
      <div class="prog-item"><div class="prog-row"><span style="color:var(--text2);">Verbal Ability</span><span id="p1pct">0%</span></div><div class="prog-bar"><div id="p1bar" class="prog-fill" style="width:0%"></div></div></div>
      <div class="prog-item"><div class="prog-row"><span style="color:var(--text2);">Algebra</span><span id="p2pct">0%</span></div><div class="prog-bar"><div id="p2bar" class="prog-fill" style="width:0%;background:linear-gradient(90deg,#3b82f6,#60a5fa);"></div></div></div>
      <div class="prog-item"><div class="prog-row"><span style="color:var(--text2);">Series & Sequence</span><span id="p3pct">0%</span></div><div class="prog-bar"><div id="p3bar" class="prog-fill" style="width:0%;background:linear-gradient(90deg,#f59e0b,#fcd34d);"></div></div></div>
    </div>
    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
  </div>

  <!-- SCORE HISTORY CHART -->
  <div class="hist-card">
    <div class="hist-title">📈 Score History</div>
    <div class="hist-sub">Practice & Assessment attempts over time</div>
    <div class="topic-filter" id="topicFilter"></div>
    <div id="histChart"></div>
    <div class="chart-labels" id="histLabels"></div>
  </div>
</div>

<script>
if(localStorage.getItem("darkMode")==="light")document.body.classList.add("light-mode");
let reg=localStorage.getItem("username");
function getUsers(){return JSON.parse(localStorage.getItem("users"))||{"714524205005":{name:"Balaji",dept:"IT",batch:"2024-2028"},"714524205053":{name:"Vicky",dept:"IT",batch:"2024-2028"},"714524205027":{name:"Ismail",dept:"IT",batch:"2024-2028"},"714524205041":{name:"Sakthivel",dept:"IT",batch:"2024-2028"}};}
let users=getUsers(),user=users[reg]||{},name=user.name||"Student";
document.getElementById("avatar").innerText=name.charAt(0);
document.getElementById("profileName").innerText=name;
document.getElementById("profileReg").innerText="Reg No: "+reg;
document.getElementById("dept").innerText=user.dept||"IT";
document.getElementById("batch").innerText=(user.batch||"2024-2028").replace("-"," – ");
let taken=localStorage.getItem("assessTaken_"+reg);
document.getElementById("assessStatus").innerText=taken==="yes"?"✅ Completed":"⏳ Not Attempted";
document.getElementById("assessStatus").style.color=taken==="yes"?"#86efac":"#fca5a5";
let p1=parseInt(localStorage.getItem("p1_done_"+reg))||0,p2=parseInt(localStorage.getItem("p2_done_"+reg))||0,p3=parseInt(localStorage.getItem("p3_done_"+reg))||0;
document.getElementById("p1pct").innerText=p1+"%";document.getElementById("p2pct").innerText=p2+"%";document.getElementById("p3pct").innerText=p3+"%";
setTimeout(()=>{document.getElementById("p1bar").style.width=p1+"%";document.getElementById("p2bar").style.width=p2+"%";document.getElementById("p3bar").style.width=p3+"%";},400);

// ── SCORE HISTORY CHART ──
let allHist=JSON.parse(localStorage.getItem("scoreHistory_"+reg))||[];
let topics=[...new Set(allHist.map(h=>h.topic))];
let activeTopic=topics[0]||"";
let colors={"Verbal Ability":"#7c3aed","Algebra":"#3b82f6","Series & Sequence":"#f59e0b","Assessment":"#10b981"};

function renderFilter(){
  let tf=document.getElementById("topicFilter");
  tf.innerHTML=topics.map(t=>`<button class="tf-btn${t===activeTopic?" on":""}" onclick="setTopic('${t.replace(/'/g,"\\'")}',this)">${t}</button>`).join("");
  if(!topics.length)tf.innerHTML='';
}
function setTopic(t,el){activeTopic=t;document.querySelectorAll(".tf-btn").forEach(b=>b.classList.remove("on"));el.classList.add("on");renderChart();}
function renderChart(){
  let hist=allHist.filter(h=>h.topic===activeTopic);
  let chart=document.getElementById("histChart"),labels=document.getElementById("histLabels");
  if(!hist.length){chart.innerHTML='<div class="no-hist">No attempts yet for this topic. Start practicing!</div>';labels.innerHTML="";return;}
  let last=hist.slice(-10);
  let maxScore=Math.max(...last.map(h=>h.total||10));
  let col=colors[activeTopic]||"#7c3aed";
  chart.innerHTML='<div class="chart-wrap">'+last.map((h,i)=>{
    let pct=Math.round((h.score/h.total)*100);
    let ht=Math.max(8,Math.round((h.score/h.total)*70));
    return `<div class="chart-bar" style="height:${ht}px;background:${col};opacity:${0.4+0.6*(i/last.length)};" data-tip="${h.date||''}: ${h.score}/${h.total} (${pct}%)">${pct}%</div>`;
  }).join("")+'</div>';
  labels.innerHTML=last.map(h=>`<div class="chart-lbl">${(h.date||"").replace(/\//g,"/")||h.time||""}</div>`).join("");
}
renderFilter();if(topics.length)renderChart();
else document.getElementById("histChart").innerHTML='<div class="no-hist">Complete a practice or assessment to see your history here.</div>';

function logout(){localStorage.removeItem("username");localStorage.removeItem("name");location.href="login.html";}

const cv=document.getElementById("c"),ctx=cv.getContext("2d");
let W=cv.width=innerWidth,H=cv.height=innerHeight;
class P{constructor(){this.reset();}reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.r=Math.random()*1.5+0.3;this.dx=(Math.random()-.5)*.35;this.dy=(Math.random()-.5)*.35;this.a=Math.random()*.5+0.1;}draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${this.a})`;ctx.fill();}update(){this.x+=this.dx;this.y+=this.dy;if(this.x<0||this.x>W||this.y<0||this.y>H)this.reset();this.draw();}}
const pts=Array.from({length:70},()=>new P());const maxD=130;
function draw(){ctx.clearRect(0,0,W,H);pts.forEach(p=>p.update());for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){let d=Math.hypot(pts[i].x-pts[j].x,pts[i].y-pts[j].y);if(d<maxD){ctx.beginPath();ctx.strokeStyle=`rgba(124,58,237,${(1-d/maxD)*0.12})`;ctx.lineWidth=0.8;ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke();}}requestAnimationFrame(draw);}
draw();addEventListener("resize",()=>{W=cv.width=innerWidth;H=cv.height=innerHeight;});
</script>
</body>
</html>
