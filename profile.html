<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Profile — APTIORA</title>
<link rel="stylesheet" href="aptiora.css">
<style>
.avatar-circle{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--purple),#6d28d9);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:white;margin:0 auto 12px;box-shadow:0 8px 28px rgba(124,58,237,0.4);}
.info-row{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;}
.info-lbl{font-size:12px;color:var(--text2);font-weight:500;}
.info-val{font-size:14px;font-weight:600;}
.chart-bar{flex:1;border-radius:4px 4px 0 0;display:flex;align-items:flex-end;justify-content:center;padding-bottom:2px;font-size:9px;color:white;font-weight:700;cursor:pointer;min-height:4px;transition:height 0.6s ease;}
.hm-cell{width:12px;height:12px;border-radius:2px;transition:all 0.2s;cursor:pointer;}
.hm-cell:hover{transform:scale(1.3);}
.tf-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:var(--text2);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;}
.tf-btn.on{background:rgba(124,58,237,0.2);border-color:rgba(124,58,237,0.4);color:#a78bfa;}
.badge-chip{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:6px 10px;font-size:11px;color:var(--text2);}
.badge-chip.earned{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.3);color:#a78bfa;}
body.light .info-row{background:rgba(0,0,0,0.03)!important;border-color:rgba(0,0,0,0.08)!important;}
body.light .info-lbl{color:rgba(26,26,46,0.55)!important;}
body.light .info-val{color:#1a1a2e!important;}
body.light .glass-card{color:#1a1a2e!important;}
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div>
<canvas class="bg-canvas" id="bgCanvas"></canvas>
<div id="sb"></div>
<div class="app-main" id="appMain">
  <div class="app-topbar">
    <div class="topbar-left"><button class="collapse-btn" id="collapseBtn">☰</button><div class="page-title">👤 Profile</div></div>
    <div class="topbar-right"><button class="tb-btn" id="themeBtn">🌙</button><button class="tb-btn" onclick="logout()" title="Logout" style="color:#fca5a5;">🚪</button></div>
  </div>
  <div class="app-page">
    <div class="grid2" style="margin-bottom:18px;align-items:start;">
      <div class="glass-card anim-fadeUp" style="text-align:center;">
        <div class="avatar-circle" id="av"></div>
        <div style="font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;margin-bottom:4px;" id="pname"></div>
        <div class="badge badge-purple" id="preg" style="margin-bottom:18px;"></div>
        <div class="info-row"><div class="info-lbl">🏫 Department</div><div class="info-val" id="pdept">IT</div></div>
        <div class="info-row"><div class="info-lbl">📅 Batch</div><div class="info-val" id="pbatch">2024–2028</div></div>
        <div class="info-row"><div class="info-lbl">🎓 Program</div><div class="info-val">B.Tech</div></div>
        <div class="info-row"><div class="info-lbl">📝 Assessment</div><div class="info-val" id="passess">Not Attempted</div></div>
        <div class="info-row"><div class="info-lbl">🔥 Streak</div><div class="info-val" id="pstreak">0 days</div></div>
        <div class="info-row"><div class="info-lbl">🏅 Badges</div><div class="info-val" id="pbadges">0 / 9</div></div>
        <div class="divider"></div>
        <div style="font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;margin-bottom:10px;text-align:left;">Aptitude Progress</div>
        <div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:var(--text2)">Verbal Ability</span><span id="pp1">0%</span></div><div class="prog-bar"><div id="pb1" class="prog-fill prog-purple" style="width:0%"></div></div></div>
        <div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:var(--text2)">Algebra</span><span id="pp2">0%</span></div><div class="prog-bar"><div id="pb2" class="prog-fill prog-blue" style="width:0%"></div></div></div>
        <div style="margin-bottom:18px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:var(--text2)">Series & Sequence</span><span id="pp3">0%</span></div><div class="prog-bar"><div id="pb3" class="prog-fill prog-gold" style="width:0%"></div></div></div>
        <button class="btn btn-danger btn-full" onclick="logout()">🚪 Logout</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div class="glass-card anim-fadeUp" style="animation-delay:0.05s">
          <div style="font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;margin-bottom:4px;">📈 Score History</div>
          <div style="font-size:12px;color:var(--text2);margin-bottom:12px;">Practice & assessment attempts</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;" id="topicFilter"></div>
          <div style="display:flex;align-items:flex-end;gap:6px;height:70px;margin-bottom:6px;" id="histChart"></div>
          <div style="display:flex;gap:6px;font-size:10px;color:var(--text2);" id="histLabels"></div>
        </div>
        <div class="glass-card anim-fadeUp" style="animation-delay:0.08s">
          <div style="font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;margin-bottom:4px;">📅 Activity Heatmap</div>
          <div style="font-size:12px;color:var(--text2);margin-bottom:8px;">Last 30 days</div>
          <div style="display:flex;flex-wrap:wrap;gap:3px;" id="hmWrap"></div>
        </div>
        <div class="glass-card anim-fadeUp" style="animation-delay:0.1s">
          <div style="font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;margin-bottom:3px;">🏅 Badges</div>
          <div style="font-size:12px;color:var(--text2);margin-bottom:10px;" id="badgeCnt2">0 / 9 earned</div>
          <div style="display:flex;gap:7px;flex-wrap:wrap;" id="bWrap"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="aptiora.js"></script>
<script>
let user=getCurrentUser();if(!user)throw'';
let {reg,name='Student',dept='IT',batch='2024-2028'}=user;
document.getElementById('sb').innerHTML=buildSidebar('profile',name,reg);
initSidebar();
document.getElementById('av').innerText=name.charAt(0).toUpperCase();
document.getElementById('pname').innerText=name;
document.getElementById('preg').innerText='Reg: '+reg;
document.getElementById('pdept').innerText=dept;
document.getElementById('pbatch').innerText=(batch||'2024-2028').replace('-',' – ');
let taken=localStorage.getItem('assessTaken_'+reg);
let el=document.getElementById('passess');el.innerText=taken==='yes'?'✅ Completed':'⏳ Not Attempted';el.style.color=taken==='yes'?'#86efac':'#fca5a5';
document.getElementById('pstreak').innerText=(localStorage.getItem('streak_'+reg)||0)+' days';
let earned=getBadges(reg);document.getElementById('pbadges').innerText=earned.length+' / '+BADGE_DEFS.length;
let p1=parseInt(localStorage.getItem('p1_done_'+reg))||0,p2=parseInt(localStorage.getItem('p2_done_'+reg))||0,p3=parseInt(localStorage.getItem('p3_done_'+reg))||0;
['1','2','3'].forEach(n=>{document.getElementById('pp'+n).innerText=[p1,p2,p3][n-1]+'%';});
setTimeout(()=>{document.getElementById('pb1').style.width=p1+'%';document.getElementById('pb2').style.width=p2+'%';document.getElementById('pb3').style.width=p3+'%';},400);
// Score history
let allHist=JSON.parse(localStorage.getItem('scoreHistory_'+reg))||[];
let topics=[...new Set(allHist.map(h=>h.topic))];let activeTopic=topics[0]||'';
let colors={'Verbal Ability':'#7c3aed','Algebra':'#3b82f6','Series & Sequence':'#f59e0b','Assessment':'#10b981'};
function renderFilter(){document.getElementById('topicFilter').innerHTML=topics.map(t=>`<button class="tf-btn${t===activeTopic?' on':''}" onclick="setT('${t.replace(/'/g,"\\'")}',this)">${t}</button>`).join('');}
function setT(t,el){activeTopic=t;document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('on'));el.classList.add('on');renderChart();}
function renderChart(){
  let hist=allHist.filter(h=>h.topic===activeTopic),chart=document.getElementById('histChart'),lbls=document.getElementById('histLabels');
  if(!hist.length){chart.innerHTML='<div style="font-size:12px;color:var(--text2);text-align:center;width:100%;padding:16px">No attempts yet.</div>';lbls.innerHTML='';return;}
  let last=hist.slice(-10),col=colors[activeTopic]||'#7c3aed';
  chart.innerHTML=last.map((h,i)=>{let pct=Math.round((h.score/h.total)*100);let ht=Math.max(6,Math.round((h.score/h.total)*68));return`<div class="chart-bar" style="height:${ht}px;background:${col};opacity:${0.4+0.6*(i/last.length)};border-radius:4px 4px 0 0;" title="${h.date||''}: ${h.score}/${h.total} (${pct}%)">${pct}%</div>`}).join('');
  lbls.innerHTML=last.map(h=>`<div style="flex:1;text-align:center;overflow:hidden;white-space:nowrap;font-size:10px">${(h.date||'').split('/').slice(0,2).join('/')}</div>`).join('');
}
renderFilter();if(topics.length)renderChart();else document.getElementById('histChart').innerHTML='<div style="font-size:12px;color:var(--text2);text-align:center;width:100%;padding:16px">Complete practice to see history.</div>';
// Heatmap
(function(){let days=[];for(let i=29;i>=0;i--){let d=new Date(Date.now()-i*86400000);days.push(d.toLocaleDateString('en-IN'));}let am={};allHist.forEach(h=>{if(h.date)am[h.date]=(am[h.date]||0)+1;});document.getElementById('hmWrap').innerHTML=days.map(d=>`<div class="hm-cell" title="${d}: ${am[d]||0}" style="background:${am[d]?`rgba(124,58,237,${Math.min(0.3+am[d]*0.25,0.85)})`:'rgba(255,255,255,0.06)'}"></div>`).join('');})();
// Badges
document.getElementById('badgeCnt2').innerText=earned.length+' / '+BADGE_DEFS.length+' earned';
document.getElementById('bWrap').innerHTML=BADGE_DEFS.map(b=>`<div class="badge-chip${earned.includes(b.id)?' earned':''}" title="${b.desc}"><span style="font-size:15px">${b.icon}</span>${b.name}</div>`).join('');
</script>
</body>
</html>
